<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polymarket Rewards Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#475569;--hint:#94a3b8;
  --green:#10b981;--gd:#059669;--gbg:#d1fae5;--gt:#065f46;
  --abg:#fef3c7;--at:#92400e;--red:#ef4444;--slate:#0f172a;--blue:#4f46e5;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--rs:7px;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
}
html{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh}
.app{max-width:1500px;margin:0 auto;padding:20px 18px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.hl{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:var(--slate);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px}
.aname{font-size:18px;font-weight:700;letter-spacing:-.4px}
.asub{font-size:11px;color:var(--hint);font-family:var(--mono)}
.lpill{display:flex;align-items:center;gap:5px;padding:4px 11px;background:var(--gbg);border-radius:20px;font-size:11px;font-weight:600;color:var(--gt)}
.ldot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fp{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;box-shadow:var(--sh)}
.fpr{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--hint)}
.bg{display:flex;gap:4px}
.tb{min-width:48px;min-height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;background:var(--card);color:var(--muted);font-family:var(--font);transition:all .12s}
.tb.on{background:var(--slate);color:#fff;border-color:var(--slate)}
.tb:hover:not(.on){border-color:#94a3b8}
.sr{display:flex;align-items:center;gap:12px}
.sv{font-size:13px;font-weight:700;color:var(--text);font-family:var(--mono);min-width:52px}
input[type=range]{-webkit-appearance:none;appearance:none;width:140px;height:6px;border-radius:3px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--slate);border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--slate);border:3px solid #fff;cursor:pointer}
.fdiv{width:1px;height:40px;background:var(--border)}
.fright{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.ct{font-size:13px;color:var(--muted)}.ct strong{color:var(--text);font-weight:700}
.upd{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--hint);font-family:var(--mono)}
.spin{width:9px;height:9px;border:1.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mbar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mb{padding:7px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .12s}
.mb.on{background:var(--slate);color:#fff;border-color:var(--slate)}
.sh{font-size:11px;color:var(--hint);margin-left:auto}
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
col.cm{width:36%}col.cr{width:8%}col.cs{width:7%}col.cn{width:6%}col.co{width:12%}col.cp{width:8%}col.ca{width:10%}
thead th{font-size:10px;font-weight:600;color:var(--hint);text-align:left;padding:10px 12px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none;cursor:pointer;background:var(--card)}
thead th:hover{color:var(--text)}thead th.r{text-align:right}
.sa{margin-left:3px;font-size:9px;opacity:.4}.sa.on{opacity:1}
tbody tr{border-bottom:.5px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}tbody tr:hover{background:#f8fafc}
tbody td{padding:10px 12px;font-size:13px;vertical-align:middle}
.cp2{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:#f1f5f9;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
.qw{display:flex;align-items:flex-start;gap:7px}
.qt{font-weight:500;font-size:13px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.mo{font-family:var(--mono);font-size:12px}.g{color:var(--gd);font-weight:600}
.d5w{display:flex;gap:3px;align-items:center}
.d5{width:8px;height:8px;border-radius:50%}.d5.on{background:var(--green)}.d5.off{background:#e2e8f0}
.obc{display:flex;align-items:center;gap:2px;height:20px}
.obb{display:flex;align-items:center;gap:1px;justify-content:flex-end}
.oba2{display:flex;align-items:center;gap:1px}
.obm{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 2px}
.obs{height:12px;border-radius:2px;flex-shrink:0}.obs.bid{background:#6ee7b7}.obs.ask{background:#fca5a5}
.swp{display:flex;flex-direction:column;align-items:center;gap:1px}
.sm{width:2px;height:8px;background:var(--blue);border-radius:1px;position:relative}
.sm::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:4px solid var(--blue)}
.ch{font-size:11px;font-weight:700;font-family:var(--mono);padding:3px 9px;border-radius:20px;white-space:nowrap}
.ch.g{background:var(--gbg);color:var(--gt)}.ch.a{background:var(--abg);color:var(--at)}
.obtn{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;background:var(--green);color:#fff;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;border:none;cursor:pointer;font-family:var(--font);transition:background .12s}
.obtn:hover{background:var(--gd)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .15s,transform .15s}
.mc:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.mc.best{border:2px solid var(--green)}
.mc.best .mca{height:3px;background:var(--green);flex-shrink:0}.mc:not(.best) .mca{display:none}
.mch{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 0}
.mcq{padding:6px 14px 0;font-size:14px;font-weight:600;color:var(--text);line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:42px}
.mcrh{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin:8px 14px 0;background:#f0fdf8;border-radius:var(--rs);border:1px solid #bbf7d0}
.mcrv{font-size:22px;font-weight:700;color:var(--gd);font-family:var(--mono);letter-spacing:-0.5px}
.mcrl{font-size:10px;color:var(--gd);font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.8}
.mcsb{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.mcsn{font-size:18px;font-weight:700;font-family:var(--mono)}.mcsn.g{color:var(--gd)}.mcsn.a{color:#d97706}
.mcsl{font-size:9px;color:var(--hint);text-align:right;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.mcgr{display:grid;grid-template-columns:1fr 1fr;padding:10px 14px 4px}
.mcc{display:flex;flex-direction:column;gap:2px;padding:6px 0;border-bottom:.5px solid var(--border)}
.mcc:nth-child(odd){padding-right:12px;border-right:.5px solid var(--border)}
.mcc:nth-child(even){padding-left:12px}.mcc:nth-last-child(-n+2){border-bottom:none}
.mck{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.mcv{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--text)}.mcv.dt{font-family:var(--font);font-size:13px;font-weight:500}
.mcsep{height:.5px;background:var(--border);margin:4px 14px 0}
.mccmp{display:flex;align-items:center;gap:8px;padding:8px 14px}
.cml{font-size:11px;font-weight:600;color:var(--gd)}
.mcobt{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;user-select:none;background:#fafbfc;border-top:.5px solid var(--border)}
.mcobl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.mcoba{font-size:11px;color:var(--hint);transition:transform .2s}.mcoba.open{transform:rotate(180deg)}
.mcobb{padding:8px 14px 10px;background:#fafbfc;border-top:.5px solid var(--border)}
.mcor{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.mcop{font-size:10px;font-family:var(--mono);min-width:34px;text-align:right;font-weight:500}
.mcop.a{color:var(--red)}.mcop.b{color:var(--gd)}
.mcob2{height:9px;border-radius:2px}.mcob2.ask{background:#fecaca}.mcob2.bid{background:#bbf7d0}
.mcos{font-size:9px;color:var(--hint);font-family:var(--mono)}
.mcost{font-size:10px;font-weight:600;color:var(--blue);padding:3px 0;border-top:1.5px dashed var(--blue);border-bottom:1.5px dashed var(--blue);margin:4px 0}
.mcosp{display:flex;align-items:center;gap:5px;padding:3px 0}
.mcosl{flex:1;height:.5px;background:var(--border)}.mcoss{font-size:9px;font-family:var(--mono);color:var(--hint)}
.mcf{padding:10px 14px 12px;margin-top:auto}
.ofbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;background:var(--green);color:#fff;border-radius:var(--rs);font-size:14px;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:var(--font);transition:background .12s}
.ofbtn:hover{background:var(--gd)}
.sk{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:sh2 1.4s infinite;border-radius:4px}
@keyframes sh2{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.sb{display:flex;flex-direction:column;align-items:center;padding:60px 24px;text-align:center;gap:14px}
.si{font-size:44px}.st{font-size:17px;font-weight:700}
.ss{font-size:13px;color:var(--muted);max-width:420px;line-height:1.6}
.rb{padding:9px 22px;background:var(--slate);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}
.pm{text-align:center;padding:16px 0 8px;font-size:13px;color:var(--muted);font-family:var(--mono)}
@media(max-width:640px){.app{padding:12px 10px}.fdiv{display:none}.fpr{gap:12px}input[type=range]{width:100px}.cg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState,useEffect=React.useEffect,useCallback=React.useCallback,useRef=React.useRef,useMemo=React.useMemo;

var EXCL=['politics','middle-east','iran'];
var CATS={crypto:'Крипто',cryptocurrency:'Крипто',sports:'Спорт',sport:'Спорт',
  esports:'Киберспорт',finance:'Финансы',economy:'Финансы',
  science:'Наука',culture:'Культура',technology:'Технологии',
  'pop-culture':'Поп-культура',business:'Бизнес'};
var COMP=['','Оч.низкая','Низкая','Средняя','Высокая','Оч.высокая'];

function getMs(m){return m.rewardsMinSize||m.rewards&&m.rewards.minSize||0}
function getSpr(m){return m.rewardsMaxSpread||m.rewards&&m.rewards.maxSpread||99}
function getRew(m){
  if(m.clobRewards&&m.clobRewards.length){
    var t=m.clobRewards.reduce(function(s,r){return s+(r.rewardsDailyRate||0)},0);
    if(t>0)return t;
  }
  if(m.rewards&&m.rewards.rates&&m.rewards.rates.length)
    return m.rewards.rates.reduce(function(s,r){return s+(r.rewardsDailyRate||0)},0);
  return 0;
}
function getCat(m){
  var tags=m._tags||[];
  var t=tags.find(function(x){return x.forceShow&&x.slug&&x.slug!=='all'});
  var f=tags.find(function(x){return x.slug&&x.slug!=='all'});
  return (t&&t.slug)||(f&&f.slug)||m.category||'other';
}
function getCatLabel(m){
  var c=getCat(m).toLowerCase();
  return CATS[c]||'Прочее';
}
function isExcl(m){
  var c=getCat(m).toLowerCase();
  return EXCL.some(function(e){return c.indexOf(e)!==-1});
}
function compLvl(m){
  var l=parseFloat(m.liquidityNum||m.liquidity||0);
  if(l<300)return 1;if(l<2000)return 2;if(l<10000)return 3;if(l<50000)return 4;return 5;
}
function analyzeBook(tid,book,ms){
  var empty={tokenId:tid,bestBidPrice:0,bestAskPrice:0,spread:0,topBidVolume:0,ourStakeUSD:0,pct:0,hasDom:false,ok:false,bids:[],asks:[],stakeLevel:0};
  if(!book||!book.bids||!book.bids.length||!book.asks||!book.asks.length)return empty;
  var bids=book.bids.filter(function(b){return b.price>0&&b.size>0}).sort(function(a,b){return b.price-a.price});
  var asks=book.asks.filter(function(a){return a.price>0&&a.size>0}).sort(function(a,b){return a.price-b.price});
  if(!bids.length||!asks.length)return empty;
  var bb=bids[0],ba=asks[0];
  var vol=bb.size*bb.price,stake=ms*bb.price;
  var pct=vol>0?(stake/vol)*100:0;
  var hasDom=bids.some(function(b){return b.size*b.price>500});
  return{tokenId:tid,bestBidPrice:bb.price,bestAskPrice:ba.price,spread:ba.price-bb.price,
    topBidVolume:vol,ourStakeUSD:stake,pct:pct,hasDom:hasDom,
    ok:vol<300&&pct>=5&&!hasDom,bids:bids.slice(0,5),asks:asks.slice(0,5),stakeLevel:0};
}
function getTokens(m){
  var tokens=m.tokens||[];
  if(!tokens.length&&m.clobTokenIds){
    try{
      var ids=JSON.parse(m.clobTokenIds);
      var prices=m.outcomePrices?JSON.parse(m.outcomePrices):['0.5','0.5'];
      tokens=[{tokenId:ids[0],outcome:'Yes',price:parseFloat(prices[0])},
              {tokenId:ids[1],outcome:'No',price:parseFloat(prices[1])}];
    }catch(e){}
  }
  return tokens;
}
function buildUrl(m){
  var es=m._eventSlug||(m.events&&m.events[0]&&m.events[0].slug);
  var ms=m.slug;
  if(es&&ms&&es!==ms)return 'https://polymarket.com/event/'+es+'/'+ms;
  return 'https://polymarket.com/event/'+(es||ms||'');
}

async function fetchAllMarkets(setMsg){
  var PAGE=100,offset=0,all=[],done=false;
  while(!done){
    var url='https://gamma-api.polymarket.com/markets?active=true&closed=false&limit='+PAGE+'&offset='+offset;
    var res=await fetch(url);
    if(!res.ok)throw new Error('API error: '+res.status);
    var page=await res.json();
    if(!Array.isArray(page)||page.length===0){done=true;break;}
    all=all.concat(page);
    setMsg('Загружено ' + all.length + ' рынков...');
    if(page.length<PAGE){done=true;}else{offset+=PAGE;}
    if(all.length>=20000){done=true;}
  }
  return all.map(function(m){
    var ev=m.events&&m.events[0];
    return Object.assign({},m,{
      _eventSlug:ev?ev.slug:m.slug,
      _tags:ev&&ev.tags?ev.tags:[],
      liquidityNum:parseFloat(m.liquidity||0),
    });
  });
}
async function fetchBook(tid){
  var res=await fetch('https://clob.polymarket.com/book?token_id='+tid);
  if(!res.ok)throw new Error('CLOB '+res.status);
  var d=await res.json();
  return{
    bids:(d.bids||[]).map(function(b){return{price:parseFloat(b.price),size:parseFloat(b.size)}}),
    asks:(d.asks||[]).map(function(a){return{price:parseFloat(a.price),size:parseFloat(a.size)}})
  };
}

function Dots5(props){
  var level=props.level;
  return React.createElement('div',{className:'d5w'},
    [1,2,3,4,5].map(function(i){
      return React.createElement('div',{key:i,className:'d5 '+(i<=level?'on':'off')});
    })
  );
}

function MiniOB(props){
  var bids=props.bids,asks=props.asks;
  if(!bids.length&&!asks.length)return React.createElement('span',{style:{fontSize:10,color:'var(--hint)'}},'-');
  var t3b=bids.slice(0,3),t3a=asks.slice(0,3);
  var all=t3b.concat(t3a).map(function(l){return l.size*l.price});
  var mx=Math.max.apply(null,all.concat([0.01]));
  var bw=function(l){return Math.max(4,Math.round((l.size*l.price/mx)*22))};
  return React.createElement('div',{className:'obc'},
    React.createElement('div',{className:'obb'},
      t3b.slice().reverse().map(function(l,i){
        return React.createElement('div',{key:i,className:'swp'},
          React.createElement('div',{className:'obs bid',style:{width:bw(l)+'px'}})
        );
      })
    ),
    React.createElement('div',{className:'obm'}),
    React.createElement('div',{className:'oba2'},
      t3a.map(function(l,i){
        return React.createElement('div',{key:i,className:'obs ask',style:{width:bw(l)+'px'}});
      })
    )
  );
}

function TableRow(props){
  var m=props.m,a=m.analysis;
  var chipCls=a.pct>=19?'ch g':'ch a';
  var rew=getRew(m);
  return React.createElement('tr',null,
    React.createElement('td',null,
      React.createElement('div',{className:'qw'},
        React.createElement('span',{className:'cp2'},getCatLabel(m)),
        React.createElement('span',{className:'qt',title:m.question},m.question)
      )
    ),
    React.createElement('td',null,React.createElement('span',{className:'mo g'},rew>0?rew.toFixed(0):'—')),
    React.createElement('td',null,React.createElement('span',{className:'mo'},getSpr(m).toFixed(1)+'¢')),
    React.createElement('td',null,React.createElement('span',{className:'mo'},getMs(m))),
    React.createElement('td',null,React.createElement(MiniOB,{bids:a.bids,asks:a.asks})),
    React.createElement('td',{style:{textAlign:'right'}},React.createElement('span',{className:chipCls},a.pct.toFixed(0)+'%')),
    React.createElement('td',{style:{textAlign:'right'}},
      React.createElement('a',{className:'obtn',href:buildUrl(m),target:'_blank',rel:'noopener noreferrer'},'Открыть ↗')
    )
  );
}

function MiniCard(props){
  var m=props.m;
  var obOpen=useState(false);
  var setObOpen=obOpen[1];obOpen=obOpen[0];
  var a=m.analysis,ms=getMs(m),rew=getRew(m);
  var isBest=a.pct>=19;
  var allV=a.bids.concat(a.asks).map(function(l){return l.size*l.price});
  var mx=Math.max.apply(null,allV.concat([0.01]));
  var bw=function(l){return Math.max(5,Math.min(80,(l.size*l.price/mx)*80))};
  var fmt=function(n){return n<0.01?n.toFixed(4):n<1?n.toFixed(3):n.toFixed(2)};
  var ed=new Date(m.endDate||'');
  var ds=isNaN(ed.getTime())?'—':ed.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
  return React.createElement('div',{className:'mc'+(isBest?' best':'')},
    React.createElement('div',{className:'mca'}),
    React.createElement('div',{className:'mch'},
      React.createElement('span',{className:'cp2'},getCatLabel(m)),
      React.createElement('span',{style:{fontSize:10,color:isBest?'var(--gd)':'#d97706',fontWeight:600,fontFamily:'var(--mono)'}},ms+'д min')
    ),
    React.createElement('div',{className:'mcq',title:m.question},m.question),
    React.createElement('div',{className:'mcrh'},

  var fs=useState({sizes:[20,40,50],maxSpread:5,minReward:25});

  var sk=useState('reward');var sortKey=sk[0],setSortKey=sk[1];
  var sd=useState(-1);var sortDir=sd[0],setSortDir=sd[1];
  var rm=useState([]);var rawMarkets=rm[0],setRaw=rm[1];
  var bk=useState({});var books=bk[0],setBooks=bk[1];
  var ld=useState(true);var loading=ld[0],setLoading=ld[1];
  var lm=useState('Загрузка рынков...');var loadMsg=lm[0],setLoadMsg=lm[1];
  var er=useState(null);var error=er[0],setError=er[1];
  var rf=useState(false);var refetching=rf[0],setRefetching=rf[1];
  var refT=useRef(null),bookT=useRef(null);

  var loadMarkets=useCallback(function(){
    return (async function(){
      try{
        setError(null);setLoadMsg('Загрузка рынков...');
        var d=await fetchAllMarkets(setLoadMsg);
        setLoadMsg('Загружено '+d.length+' рынков');
        setRaw(d);
      }catch(e){setError(e.message);}
      finally{setLoading(false);}
    })();
  },[]);

  useEffect(function(){
    loadMarkets();
    refT.current=setInterval(loadMarkets,300000);
    return function(){clearInterval(refT.current)};
  },[loadMarkets]);

  var loadBooks=useCallback(function(markets){
    return (async function(){
      if(!markets.length)return;
      setRefetching(true);
      await Promise.allSettled(markets.slice(0,30).map(async function(m){
        var tokens=getTokens(m);
        var tok=tokens.find(function(t){return t.outcome&&t.outcome.toLowerCase()==='yes'})||tokens[0];
        if(!tok||!tok.tokenId)return;
        try{
          var b=await fetchBook(tok.tokenId);
          setBooks(function(p){var n=Object.assign({},p);n[tok.tokenId]=b;return n});
        }catch(e){}
      }));
      setRefetching(false);
    })();
  },[]);

  useEffect(function(){
    if(rawMarkets.length){
      loadBooks(rawMarkets);
      bookT.current=setInterval(function(){loadBooks(rawMarkets)},30000);
    }
    return function(){clearInterval(bookT.current)};
  },[rawMarkets,loadBooks]);

  var processed=useMemo(function(){
    // sizes array = selected max thresholds. Market passes if its minSize <= any selected threshold
    var maxAllowed=Math.max.apply(null,filters.sizes);
    return rawMarkets.filter(function(m){
      if(isExcl(m))return false;
      var ms=getMs(m);
      if(!ms||ms<=0)return false;   // must have rewards
      if(ms>maxAllowed)return false; // minSize too large for our budget
      if(getSpr(m)>=filters.maxSpread)return false;
      if(getRew(m)<filters.minReward)return false;
      return true;
    }).map(function(m){
      var tokens=getTokens(m);
      var tok=tokens.find(function(t){return t.outcome&&t.outcome.toLowerCase()==='yes'})||tokens[0];
      var tid=tok&&tok.tokenId?tok.tokenId:'';
      var book=tid&&books[tid]?books[tid]:{bids:[],asks:[]};
      var analysis=analyzeBook(tid,book,getMs(m));
      return Object.assign({},m,{_cl:compLvl(m),analysis:analysis});
    });
  },[rawMarkets,books,filters]);

  var sorted=useMemo(function(){
    var fn={
      reward:function(m){return getRew(m)},
      spread:function(m){return -getSpr(m)},
      minSize:function(m){return getMs(m)},
      pct:function(m){return m.analysis.pct},
    };
    var f=fn[sortKey]||fn.reward;
    return processed.slice().sort(function(a,b){return sortDir*(f(b)-f(a))});
  },[processed,sortKey,sortDir]);

  function toggleSort(k){
    if(sortKey===k)setSortDir(function(d){return -d});
    else{setSortKey(k);setSortDir(-1);}
  }
  function arr(k){return sortKey===k?(sortDir===-1?'↓':'↑'):'↕'}

  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'hdr'},
      React.createElement('div',{className:'hl'},
        React.createElement('div',{className:'logo'},
          React.createElement('svg',{viewBox:'0 0 24 24',fill:'none'},
            React.createElement('path',{d:'M3 3h7v7H3V3zM14 3h7v7h-7V3zM3 14h7v7H3v-7z',stroke:'white',strokeWidth:'1.8',strokeLinejoin:'round'}),
            React.createElement('circle',{cx:'17.5',cy:'17.5',r:'3.5',stroke:'white',strokeWidth:'1.8'})
          )
        ),
        React.createElement('div',null,
          React.createElement('div',{className:'aname'},'Polymarket Rewards Scanner'),
          React.createElement('div',{className:'asub'},'Сканер рынков для ликвидити-провайдеров')
        )
      ),
      React.createElement('div',{className:'lpill'},React.createElement('div',{className:'ldot'}),'Live · 30с')
    ),
    React.createElement('div',{className:'fp'},
      React.createElement('div',{className:'fpr'},
        React.createElement('div',{className:'fg'},
          React.createElement('div',{className:'fl'},'Макс. размер ставки (мин.доли)'),
          React.createElement('div',{className:'bg'},
            [[20,'≤20д'],[40,'≤40д'],[50,'≤50д']].map(function(pair){
              var sz=pair[0],lbl=pair[1];
              return React.createElement('button',{
                key:sz,className:'tb'+(filters.sizes.indexOf(sz)!==-1?' on':''),
                onClick:function(){
                  setFilters(function(f){
                    var has=f.sizes.indexOf(sz)!==-1;
                    var next=has?f.sizes.filter(function(s){return s!==sz}):f.sizes.concat([sz]);
                    return Object.assign({},f,{sizes:next.length?next:f.sizes});
                  });
                }
              },lbl);
            })
          )
        ),
        React.createElement('div',{className:'fdiv'}),
        React.createElement('div',{className:'fg'},
          React.createElement('div',{className:'fl'},'Мин. награда/день'),
          React.createElement('div',{className:'sr'},
            React.createElement('input',{type:'range',min:1,max:200,step:1,value:filters.minReward,
              onChange:function(e){setFilters(function(f){return Object.assign({},f,{minReward:+e.target.value})})}}),
            React.createElement('span',{className:'sv'},'>= '+filters.minReward)
          )
        ),
        React.createElement('div',{className:'fdiv'}),
        React.createElement('div',{className:'fg'},
          React.createElement('div',{className:'fl'},'Макс. спред'),
          React.createElement('div',{className:'sr'},
            React.createElement('input',{type:'range',min:1,max:5,step:0.5,value:filters.maxSpread,
              onChange:function(e){setFilters(function(f){return Object.assign({},f,{maxSpread:+e.target.value})})}}),
            React.createElement('span',{className:'sv'},'< '+filters.maxSpread+'¢')
          )
        ),
        React.createElement('div',{className:'fright'},
          React.createElement('div',{className:'ct'},'Найдено: ',React.createElement('strong',null,loading?'…':sorted.length),' из ',rawMarkets.length),
          refetching&&React.createElement('div',{className:'upd'},React.createElement('div',{className:'spin'}),'Обновление...')
        )
      )
    ),
    !loading&&!error&&React.createElement('div',{className:'mbar'},
      React.createElement('button',{className:'mb'+(mode==='table'?' on':''),onClick:function(){setMode('table')}},'☰ Таблица'),
      React.createElement('button',{className:'mb'+(mode==='cards'?' on':''),onClick:function(){setMode('cards')}},'⊞ Карточки'),
      mode==='table'&&React.createElement('span',{className:'sh'},'Кликни заголовок для сортировки')
    ),
    loading&&React.createElement('div',{className:'pm'},loadMsg),
    loading&&(mode==='table'?React.createElement(SkTbl,null):React.createElement(SkCards,null)),
    !loading&&error&&React.createElement('div',{className:'sb'},
      React.createElement('div',{className:'si'},'⚠️'),
      React.createElement('div',{className:'st'},'Ошибка загрузки'),
      React.createElement('div',{className:'ss'},error),
      React.createElement('button',{className:'rb',onClick:function(){setLoading(true);loadMarkets();}},'Повторить')
    ),
    !loading&&!error&&sorted.length===0&&React.createElement('div',{className:'sb'},
      React.createElement('div',{className:'si'},'🔍'),
      React.createElement('div',{className:'st'},'Рынки не найдены'),
      React.createElement('div',{className:'ss'},'Загружено '+rawMarkets.length+' рынков с наградами. Ни один не прошёл фильтры (minSize 20/40/50, спред < '+filters.maxSpread+'¢, награда >= '+filters.minReward+'). Попробуйте снизить минимальную награду.')
    ),
    !loading&&!error&&sorted.length>0&&mode==='table'&&React.createElement('div',{className:'tw'},
      React.createElement('table',null,
        React.createElement('colgroup',null,
          React.createElement('col',{className:'cm'}),React.createElement('col',{className:'cr'}),
          React.createElement('col',{className:'cs'}),React.createElement('col',{className:'cn'}),
          React.createElement('col',{className:'co'}),React.createElement('col',{className:'cp'}),
          React.createElement('col',{className:'ca'})
        ),
        React.createElement('thead',null,React.createElement('tr',null,
          React.createElement('th',null,'Рынок'),
          React.createElement('th',{onClick:function(){toggleSort('reward')}},'Награда ',React.createElement('span',{className:'sa'+(sortKey==='reward'?' on':'')},arr('reward'))),
          React.createElement('th',{onClick:function(){toggleSort('spread')}},'Спред ',React.createElement('span',{className:'sa'+(sortKey==='spread'?' on':'')},arr('spread'))),
          React.createElement('th',{onClick:function(){toggleSort('minSize')}},'Min ',React.createElement('span',{className:'sa'+(sortKey==='minSize'?' on':'')},arr('minSize'))),
          React.createElement('th',null,'Стакан'),
          React.createElement('th',{className:'r',onClick:function(){toggleSort('pct')}},'Доля ',React.createElement('span',{className:'sa'+(sortKey==='pct'?' on':'')},arr('pct'))),
          React.createElement('th',{className:'r'})
        )),
        React.createElement('tbody',null,sorted.map(function(m){

        }))
      )
    ),
    !loading&&!error&&sorted.length>0&&mode==='cards'&&React.createElement('div',{className:'cg'},
      sorted.map(function(m){
        return React.createElement(MiniCard,{key:m.conditionId||m.id,m:m});
