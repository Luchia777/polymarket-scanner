<style>

/* why this market */

.ofbtn:hover{background:var(--gd)}

.sk{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:sh2 1.4s infinite;border-radius:4px}
@keyframes sh2{0%{background-position:200% 0}100%{background-position:-200% 0}}

<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState,useEffect=React.useEffect,useCallback=React.useCallback,useRef=React.useRef,useMemo=React.useMemo;

var EXCL=['politics','middle-east','iran'];
var CATS={
  crypto:'Crypto',cryptocurrency:'Crypto','crypto-defi':'Crypto',
  sports:'Sports',sport:'Sports',baseball:'Sports',basketball:'Sports',
  football:'Sports',soccer:'Sports',tennis:'Sports',hockey:'Sports',golf:'Sports',
  mma:'Sports',boxing:'Sports',nfl:'Sports',nba:'Sports',mlb:'Sports',nhl:'Sports',
  esports:'Esports',gaming:'Esports',
  finance:'Finance',economy:'Finance',markets:'Finance',stocks:'Finance',
  science:'Science',technology:'Tech',tech:'Tech',ai:'Tech',
  'pop-culture':'Pop Culture','pop culture':'Pop Culture',entertainment:'Pop Culture',
  business:'Business',politics:'Politics',
  'middle-east':'Middle East',iran:'Iran',
};
var COMP=['','Very low','Low','Medium','High','Very high'];

function getMs(m){return m.rewardsMinSize||m.rewards&&m.rewards.minSize||0}
function getSpr(m){return m.rewardsMaxSpread||m.rewards&&m.rewards.maxSpread||99}
function getRew(m){
  if(m.clobRewards&&m.clobRewards.length){
    var t=m.clobRewards.reduce(function(s,r){return s+(r.rewardsDailyRate||0)},0);
    if(t>0)return t;
  }
  if(m.rewards&&m.rewards.rates&&m.rewards.rates.length)
    return m.rewards.rates.reduce(function(s,r){return s+(r.rewardsDailyRate||0)},0);
  return 0;
}
function getCat(m){
  var tags=m._tags||[];
  var t=tags.find(function(x){return x.forceShow&&x.slug&&x.slug!=='all'});
  var f=tags.find(function(x){return x.slug&&x.slug!=='all'});
  return (t&&t.slug)||(f&&f.slug)||m.category||'other';
}
function getCatLabel(m){
  var c=getCat(m).toLowerCase();
  if(CATS[c])return CATS[c];
  for(var k in CATS){if(c.indexOf(k)!==-1)return CATS[k];}
  var q=(m.question||'').toLowerCase();
  if(q.indexOf('bitcoin')+q.indexOf('eth')+q.indexOf('crypto')+q.indexOf('token')+q.indexOf('btc')>-4)return 'Crypto';
  if(q.indexOf('nba')+q.indexOf('nfl')+q.indexOf('mlb')+q.indexOf('nhl')+q.indexOf('soccer')>-4)return 'Sports';
  if(q.indexOf('esport')+q.indexOf('lol')+q.indexOf('dota')+q.indexOf('cs2')+q.indexOf('lck')>-4)return 'Esports';
  return 'Other';
}
function isExcl(m){
  var c=getCat(m).toLowerCase();
  return EXCL.some(function(e){return c.indexOf(e)!==-1});
}
function compLvl(m){
  var l=parseFloat(m.liquidityNum||m.liquidity||0);
  if(l<300)return 1;if(l<2000)return 2;if(l<10000)return 3;if(l<50000)return 4;return 5;
}
function analyzeBook(tid,book,ms,maxSpread){
  var empty={tokenId:tid,bestBidPrice:0,bestAskPrice:0,spread:0,topBidVolume:0,ourStakeUSD:0,pct:0,totalVol:0,ok:false,bids:[],asks:[]};
  if(!book||!book.bids||!book.bids.length||!book.asks||!book.asks.length)return empty;
  var bids=book.bids.filter(function(b){return b.price>0&&b.size>0}).sort(function(a,b){return b.price-a.price});
  var asks=book.asks.filter(function(a){return a.price>0&&a.size>0}).sort(function(a,b){return a.price-b.price});
  if(!bids.length||!asks.length)return empty;
  var bb=bids[0],ba=asks[0];
  // Competition that matters = orders NEAR the midpoint, i.e. within the reward
  // max-spread. The CLOB book also returns far-away "parked" orders that never
  // compete for the daily reward; counting them wrongly inflated liquidity and
  // marked good markets as crowded. We sum (size * price) only for orders within
  // +/- maxSpread of the midpoint, on both sides. Cap at $3300.
  var mid=(bb.price+ba.price)/2;
  var band=(maxSpread>0&&maxSpread<50?maxSpread:5)/100;
  function near(l){return Math.abs(l.price-mid)<=band+1e-9}
  var bidVol=bids.filter(near).reduce(function(s,l){return s+l.size*l.price},0);
  var askVol=asks.filter(near).reduce(function(s,l){return s+l.size*l.price},0);
  var totalVol=bidVol+askVol;
  var topBidVolume=bb.size*bb.price;
  var stake=ms*bb.price;
  var pct=topBidVolume>0?(stake/topBidVolume)*100:0;
  var spreadCents=(ba.price-bb.price)*100;
  var ok=totalVol>=10&&totalVol<=3300&&pct>=5&&pct<=100&&spreadCents<5;
  return{tokenId:tid,bestBidPrice:bb.price,bestAskPrice:ba.price,
    spread:ba.price-bb.price,topBidVolume:topBidVolume,ourStakeUSD:stake,pct:pct,totalVol:totalVol,
    ok:ok,bids:bids.slice(0,5),asks:asks.slice(0,5)};
}
// Opportunity score 0-100, built around COMPETITION (not reward).
function calcScore(a){
  if(!a||!a.ok)return 0;
  var share=Math.max(0,Math.min(100,a.pct));
  var empt=Math.max(0,Math.min(100,(3300-a.totalVol)/3300*100));
  var sc=a.spread*100;
  var tight=Math.max(0,Math.min(100,(5-sc)/5*100));
  return Math.round(Math.max(0,Math.min(100,0.5*empt+0.3*tight+0.2*share)));
}
// Status, score colour and the button label all derive from the SAME 0-100
// score, so they can never contradict each other.
// 80-100 Excellent | 60-79 Good | 40-59 Worth checking | 0-39 Crowded.
function scoreCls(s){return s>=60?'g':s>=40?'a':'n'}
function statusOf(s){
  if(s>=80)return{label:'Excellent',cls:'g'};
  if(s>=60)return{label:'Good',cls:'g'};
  if(s>=40)return{label:'Worth checking',cls:'a'};
  return{label:'Crowded',cls:'n'};
}
function btnInfo(s){
  if(s>=80)return{label:'Open market',cls:''};
  if(s>=60)return{label:'Check market',cls:''};
  if(s>=40)return{label:'Check market',cls:' alt'};
  return{label:'View anyway',cls:' neutral'};
}
function getTokens(m){
  var tokens=m.tokens||[];
  if(!tokens.length&&m.clobTokenIds){
    try{
      var ids=JSON.parse(m.clobTokenIds);
      var prices=m.outcomePrices?JSON.parse(m.outcomePrices):['0.5','0.5'];
      tokens=[{tokenId:ids[0],outcome:'Yes',price:parseFloat(prices[0])},
              {tokenId:ids[1],outcome:'No',price:parseFloat(prices[1])}];
    }catch(e){}
  }
  return tokens;

function buildUrl(m){
