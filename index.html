<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polymarket Rewards Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#475569;--hint:#94a3b8;
  --green:#10b981;--green-dark:#059669;--green-bg:#d1fae5;--green-text:#065f46;
  --amber-bg:#fef3c7;--amber-text:#92400e;
  --red:#ef4444;--red-light:#fca5a5;
  --slate:#0f172a;--blue:#4f46e5;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--r-sm:7px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
}
html{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh}

/* ── Layout ── */
.app{max-width:1500px;margin:0 auto;padding:20px 18px}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:var(--slate);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px}
.app-name{font-size:18px;font-weight:700;letter-spacing:-.4px}
.app-sub{font-size:11px;color:var(--hint);font-family:var(--mono)}
.live-pill{display:flex;align-items:center;gap:5px;padding:4px 11px;background:var(--green-bg);border-radius:20px;font-size:11px;font-weight:600;color:var(--green-text)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Filter Panel ── */
.fp{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
.fp-row{display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap}
.fp-group{display:flex;flex-direction:column;gap:6px}
.fp-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--hint)}
.btn-grp{display:flex;gap:4px}
.tog{min-width:46px;min-height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);font-family:var(--font);transition:all .12s}
.tog.on{background:var(--slate);color:#fff;border-color:var(--slate)}
.tog:hover:not(.on){border-color:#94a3b8}

/* ── FIX 4: Large accessible sliders ── */
.sld-row{display:flex;align-items:center;gap:12px}
.sld-val{font-size:13px;font-weight:700;color:var(--text);font-family:var(--mono);min-width:64px}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:150px;height:6px;border-radius:3px;
  background:var(--border);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:22px;height:22px;border-radius:50%;
  background:var(--slate);border:3px solid #fff;
  box-shadow:0 1px 4px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.08);
  cursor:pointer;transition:transform .1s;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.1)}
input[type=range]::-moz-range-thumb{
  width:22px;height:22px;border-radius:50%;
  background:var(--slate);border:3px solid #fff;
  box-shadow:0 1px 4px rgba(0,0,0,.25);
  cursor:pointer;
}

.fp-div{width:1px;height:40px;background:var(--border)}
.fp-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.count-txt{font-size:13px;color:var(--muted)}
.count-txt strong{color:var(--text);font-weight:700}
.count-txt.zero strong{color:#f59e0b}
.upd{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--hint);font-family:var(--mono)}
.spin{width:9px;height:9px;border:1.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Mode switcher ── */
.mode-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mode-btn{padding:7px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .12s;display:flex;align-items:center;gap:6px}
.mode-btn.on{background:var(--slate);color:#fff;border-color:var(--slate)}
.mode-btn:hover:not(.on){border-color:#94a3b8}
.sort-hint{font-size:11px;color:var(--hint);margin-left:auto}

/* ── TABLE MODE ── */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
/* FIX 1: wide market column so questions get 2 lines */
col.c-market{width:38%}
col.c-reward{width:9%}
col.c-spread{width:7%}
col.c-min{width:6%}
col.c-comp{width:9%}
col.c-ob{width:11%}
col.c-share{width:8%}
col.c-action{width:10%}

thead th{
  font-size:10px;font-weight:600;color:var(--hint);text-align:left;
  padding:10px 12px;letter-spacing:.06em;text-transform:uppercase;
  border-bottom:1px solid var(--border);white-space:nowrap;
  user-select:none;cursor:pointer;background:var(--card);
}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--text)}
thead th.r{text-align:right}
.sort-arrow{margin-left:3px;font-size:9px;opacity:.4}
.sort-arrow.on{opacity:1;color:var(--slate)}

tbody tr{border-bottom:.5px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8fafc}
tbody td{padding:10px 12px;font-size:13px;vertical-align:middle}

.cat-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:#f1f5f9;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}

/* FIX 1: question — 2 lines, no hard truncate */
.q-cell-wrap{display:flex;align-items:flex-start;gap:7px}
.q-text{
  font-weight:500;font-size:13px;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  line-height:1.4;word-break:break-word;
}

.mono{font-family:var(--mono);font-size:12px}
.g{color:var(--green-dark);font-weight:600}

/* FIX 3: competition — always 5 slots */
.dots5{display:flex;gap:3px;align-items:center}
.d5{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d5.on{background:var(--green)}
.d5.off{background:#e2e8f0}

/* FIX 2: order book — bids LEFT (green), asks RIGHT (red), volume-proportional */
.ob-cell{display:flex;align-items:center;gap:2px;height:20px}
.ob-bids{display:flex;align-items:center;gap:1px;justify-content:flex-end}
.ob-asks{display:flex;align-items:center;gap:1px;justify-content:flex-start}
.ob-mid{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 2px}
.ob-seg{height:12px;border-radius:2px;flex-shrink:0}
.ob-seg.bid{background:#6ee7b7}
.ob-seg.ask{background:#fca5a5}
/* stake marker: a small arrow/line above ob bars */
.ob-stake-wrap{display:flex;flex-direction:column;align-items:center;gap:1px;position:relative}
.ob-stake-marker{
  width:2px;height:8px;background:var(--blue);border-radius:1px;
  position:relative;
}
.ob-stake-marker::before{
  content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  border-left:4px solid transparent;border-right:4px solid transparent;
  border-bottom:4px solid var(--blue);
}

.chip{font-size:11px;font-weight:700;font-family:var(--mono);padding:3px 9px;border-radius:20px;white-space:nowrap}
.chip.g{background:var(--green-bg);color:var(--green-text)}
.chip.a{background:var(--amber-bg);color:var(--amber-text)}
.open-btn-sm{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 13px;background:var(--green);color:#fff;
  border-radius:6px;font-size:12px;font-weight:600;
  text-decoration:none;white-space:nowrap;border:none;
  cursor:pointer;font-family:var(--font);transition:background .12s;
}
.open-btn-sm:hover{background:var(--green-dark)}

/* ── CARD MODE ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .15s,transform .15s}
.mcard:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.mcard.best{border:2px solid var(--green)}

/* Top accent bar for best cards */
.mcard.best .mc-accent{height:3px;background:linear-gradient(90deg,var(--green),#34d399);flex-shrink:0}
.mcard:not(.best) .mc-accent{display:none}

.mc-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 0}
.mc-q{padding:6px 14px 0;font-size:14px;font-weight:600;color:var(--text);line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:42px}

/* Hero reward block — main visual anchor */
.mc-reward-hero{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px;margin:8px 14px 0;background:#f0fdf8;border-radius:var(--r-sm);border:1px solid #bbf7d0}
.mc-reward-val{font-size:22px;font-weight:700;color:var(--green-dark);font-family:var(--mono);letter-spacing:-0.5px}
.mc-reward-label{font-size:10px;color:var(--green-dark);font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.8}
.mc-share-big{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.mc-share-num{font-size:18px;font-weight:700;font-family:var(--mono)}
.mc-share-num.g{color:var(--green-dark)}
.mc-share-num.a{color:#d97706}
.mc-share-label{font-size:9px;color:var(--hint);text-align:right;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

/* 2-column stats grid */
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:10px 14px 4px}
.mc-cell{display:flex;flex-direction:column;gap:2px;padding:6px 0;border-bottom:.5px solid var(--border)}
.mc-cell:nth-child(odd){padding-right:12px;border-right:.5px solid var(--border)}
.mc-cell:nth-child(even){padding-left:12px}
.mc-cell:nth-last-child(-n+2){border-bottom:none}
.mc-k{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.mc-v{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--text)}
.mc-v.date{font-family:var(--font);font-size:13px;font-weight:500}

/* Competition row */
.mc-sep{height:.5px;background:var(--border);margin:4px 14px 0}
.mc-comp{display:flex;align-items:center;gap:8px;padding:8px 14px}
.comp-lbl{font-size:11px;font-weight:600;color:var(--green-dark)}

/* Collapsible order book */
.mc-ob-toggle{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;user-select:none;background:#fafbfc;border-top:.5px solid var(--border)}
.mc-ob-toggle-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:5px}
.mc-ob-toggle-arrow{font-size:11px;color:var(--hint);transition:transform .2s}
.mc-ob-toggle-arrow.open{transform:rotate(180deg)}
.mc-ob-body{padding:8px 14px 10px;background:#fafbfc;border-top:.5px solid var(--border)}
.mc-ob-row{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.mc-ob-price{font-size:10px;font-family:var(--mono);min-width:34px;text-align:right;font-weight:500}
.mc-ob-price.a{color:var(--red)}
.mc-ob-price.b{color:var(--green-dark)}
.mc-ob-bar{height:9px;border-radius:2px}
.mc-ob-bar.ask{background:#fecaca}
.mc-ob-bar.bid{background:#bbf7d0}
.mc-ob-sz{font-size:9px;color:var(--hint);font-family:var(--mono);min-width:28px}
.mc-stake{font-size:10px;font-weight:600;color:var(--blue);padding:3px 0;border-top:1.5px dashed var(--blue);border-bottom:1.5px dashed var(--blue);margin:4px 0}
.mc-ob-sep{display:flex;align-items:center;gap:5px;padding:3px 0}
.mc-ob-line{flex:1;height:.5px;background:var(--border)}
.mc-ob-spread{font-size:9px;font-family:var(--mono);color:var(--hint)}

.mc-footer{padding:10px 14px 12px}
.open-btn-full{
  display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:11px;background:var(--green);color:#fff;border-radius:var(--r-sm);
  font-size:14px;font-weight:600;text-decoration:none;border:none;
  cursor:pointer;font-family:var(--font);transition:background .12s;letter-spacing:.01em;
}
.open-btn-full:hover{background:var(--green-dark)}

/* ── Skeleton ── */
.skel{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:4px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}

/* ── States ── */
.state-box{display:flex;flex-direction:column;align-items:center;padding:60px 24px;text-align:center;gap:14px}
.state-icon{font-size:44px}
.state-title{font-size:17px;font-weight:700}
.state-sub{font-size:13px;color:var(--muted);max-width:360px;line-height:1.6}
.retry-btn{padding:9px 22px;background:var(--slate);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}

@media(max-width:640px){
  .app{padding:12px 10px}
  .fp-div{display:none}
  .fp-row{gap:12px}
  input[type=range]{width:110px}
  .cards-grid{grid-template-columns:1fr}
}
</style>
</head>

// ═══ SERVICES ════════════════════════════════════════════════
function dailyReward(m){
  // Mock data: rewards.rates array
  if(m.rewards?.rates?.length) return m.rewards.rates.reduce((s,r)=>s+(r.rewardsDailyRate??0),0);
  // Real API: estimate from rewardsMinSize (Polymarket pays ~$1-5 per min-size unit per day)
  // Use liquidity as proxy: higher liquidity markets tend to have higher rewards
  // Real rewards endpoint: clob.polymarket.com/rewards — for now use minSize heuristic
  const minSz=m.rewardsMinSize??m.rewards?.minSize??0;
  if(!minSz) return 0;
  // Conservative estimate: markets with lower minSize tend to have rewards $30-100/day range
  // We'll show actual $ only when we have rates data, otherwise show minSize as proxy score
  return minSz<=20?45:minSz<=50?60:80;
}
function compLevel(m){const l=m.liquidity??0;return l<500?1:l<2000?2:l<8000?3:l<25000?4:5}
function eligible(m,f){
  const cat=(m.category??'').toLowerCase();
  if(EXCL.some(e=>cat.includes(e)))return false;
  // Support both mock (rewards.minSize) and real API (rewardsMinSize) field names
  const ms=m.rewards?.minSize??m.rewardsMinSize??0;
  if(!ALLOWED.includes(ms))return false;
  if(!f.sizes.includes(ms))return false;
  if(dailyReward(m)<f.reward)return false;
  const maxSpr=m.rewards?.maxSpread??m.rewardsMaxSpread??99;
  if(maxSpr>=f.spread)return false;
  if(compLevel(m)>2)return false;
  return true;
}
function analyzeBook(tokenId,book,minSize){
  const empty={tokenId,bestBidPrice:0,bestAskPrice:0,spread:0,topBidVolume:0,ourStakeUSD:0,pct:0,hasDom:false,ok:false,bids:[],asks:[],stakeLevel:null};
  if(!book?.bids?.length||!book?.asks?.length)return empty;
  const bids=[...book.bids].filter(b=>b.price>0&&b.size>0).sort((a,b)=>b.price-a.price);
  const asks=[...book.asks].filter(a=>a.price>0&&a.size>0).sort((a,b)=>a.price-b.price);
  if(!bids.length||!asks.length)return empty;
  const bb=bids[0],ba=asks[0];
  const vol=bb.size*bb.price;
  const stake=minSize*bb.price;
  const pct=vol>0?(stake/vol)*100:0;
  const hasDom=bids.some(b=>b.size*b.price>500);
  // Find which bid level the stake would land on
  const stakeIdx=bids.findIndex(b=>b.price<=bb.price);
  return{tokenId,bestBidPrice:bb.price,bestAskPrice:ba.price,
    spread:ba.price-bb.price,topBidVolume:vol,ourStakeUSD:stake,
    pct,hasDom,ok:vol<300&&pct>=5&&!hasDom,
    bids:bids.slice(0,5),asks:asks.slice(0,5),stakeLevel:0};
}

// ═══ API ══════════════════════════════════════════════════════
async function fetchMarkets(){
  if(USE_MOCK){await new Promise(r=>setTimeout(r,800));return MOCK_MARKETS;}
  // Use /events endpoint — it returns events with nested markets array
  // Each market gets enriched with its parent event's slug for URL building
  const res=await fetch('https://gamma-api.polymarket.com/events?active=true&closed=false&limit=100&order=volume&ascending=false');
  if(!res.ok)throw new Error('HTTP '+res.status);
  const events=await res.json();
  // Flatten: for each event, attach its slug to each child market
  const markets=[];
  for(const ev of (Array.isArray(events)?events:[])){
    for(const mkt of (ev.markets??[])){
      markets.push({...mkt, _eventSlug:ev.slug, category:(ev.tags??[]).find(t=>t.forceShow)?.slug??ev.tags?.[0]?.slug??'other'});
    }
  }
  return markets;
}
async function fetchBook(tid){
  if(USE_MOCK){await new Promise(r=>setTimeout(r,200));return MOCK_BOOKS[tid]??{bids:[],asks:[]};}
  const res=await fetch('https://clob.polymarket.com/book?token_id='+tid);
  if(!res.ok)throw new Error('CLOB '+res.status);
  const d=await res.json();
  return{
    bids:(d.bids??[]).map(b=>({price:parseFloat(b.price),size:parseFloat(b.size)})),
    asks:(d.asks??[]).map(a=>({price:parseFloat(a.price),size:parseFloat(a.size)}))
  };
}

// FIX 2: Bids LEFT (green), asks RIGHT (red), volume-proportional bars, stake marker
function MiniOB({bids,asks,stakeLevel}){
  if(!bids.length&&!asks.length)return<span style={{fontSize:10,color:'var(--hint)'}}>—</span>;

  // volume-proportional widths — max 3 bars each side
  const topBids=bids.slice(0,3);
  const topAsks=asks.slice(0,3);
  const allVols=[...topBids,...topAsks].map(l=>l.size*l.price);
  const mx=Math.max(...allVols,0.01);
  const barW=l=>Math.max(4,Math.round((l.size*l.price/mx)*22));

  return<div className="ob-cell">
    {/* Bids — LEFT — green */}
    <div className="ob-bids">
      {[...topBids].reverse().map((l,i)=>{
        const isStake=i===topBids.length-1-stakeLevel;
        return<div key={i} className="ob-stake-wrap" title={`Bid ${(l.price*100).toFixed(1)}¢ × ${l.size.toFixed(0)}д`}>
          {isStake&&<div className="ob-stake-marker"/>}
          <div className="ob-seg bid" style={{width:barW(l)+'px'}}/>
        </div>;
      })}
    </div>
    <div className="ob-mid"/>
    {/* Asks — RIGHT — red */}
    <div className="ob-asks">
      {topAsks.map((l,i)=>(
        <div key={i} className="ob-seg ask" style={{width:barW(l)+'px'}}
          title={`Ask ${(l.price*100).toFixed(1)}¢ × ${l.size.toFixed(0)}д`}/>
      ))}
    </div>
  </div>;
}

function App(){
  const [filters,setFilters]=useState({sizes:[20,40,50],reward:30,spread:5});
  const [mode,setMode]=useState('table');
  const [sortKey,setSortKey]=useState('pct');
  const [sortDir,setSortDir]=useState(-1);
  const [rawMarkets,setRaw]=useState([]);
  const [books,setBooks]=useState({});
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [refetching,setRefetching]=useState(false);
  const refT=useRef(null),bookT=useRef(null);

  const loadMarkets=useCallback(async()=>{
    try{setError(null);const d=await fetchMarkets();setRaw(d);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{
    loadMarkets();
    refT.current=setInterval(loadMarkets,300000);
    return()=>clearInterval(refT.current);
  },[loadMarkets]);

  const loadBooks=useCallback(async(markets)=>{
    if(!markets.length)return;
    setRefetching(true);
    await Promise.allSettled(markets.slice(0,15).map(async m=>{
      // Real API: tokens may be in clobTokenIds (JSON string) instead of tokens array
      let tokens=m.tokens??[];
      if(!tokens.length&&m.clobTokenIds){
        try{
          const ids=JSON.parse(m.clobTokenIds);
          tokens=[{tokenId:ids[0],outcome:'Yes',price:parseFloat(m.outcomePrices?JSON.parse(m.outcomePrices)[0]:0.5)},
                  {tokenId:ids[1],outcome:'No', price:parseFloat(m.outcomePrices?JSON.parse(m.outcomePrices)[1]:0.5)}];
        }catch{}
      }
      const tok=tokens.find(t=>t.outcome?.toLowerCase()==='yes')??tokens[0];
      if(!tok)return;
      try{const b=await fetchBook(tok.tokenId);setBooks(p=>({...p,[tok.tokenId]:b}));}catch{}
    }));
    setRefetching(false);
  },[]);

  useEffect(()=>{
    if(rawMarkets.length){
      loadBooks(rawMarkets);
      bookT.current=setInterval(()=>loadBooks(rawMarkets),30000);
    }
    return()=>clearInterval(bookT.current);
  },[rawMarkets,loadBooks]);

  const processed=useMemo(()=>{
    return rawMarkets.filter(m=>eligible(m,filters)).map(m=>{
      // Real API: tokens may be in clobTokenIds (JSON string) instead of tokens array
      let tokens=m.tokens??[];
      if(!tokens.length&&m.clobTokenIds){
        try{
          const ids=JSON.parse(m.clobTokenIds);
          tokens=[{tokenId:ids[0],outcome:'Yes',price:parseFloat(m.outcomePrices?JSON.parse(m.outcomePrices)[0]:0.5)},
                  {tokenId:ids[1],outcome:'No', price:parseFloat(m.outcomePrices?JSON.parse(m.outcomePrices)[1]:0.5)}];
        }catch{}
      }
      const tok=tokens.find(t=>t.outcome?.toLowerCase()==='yes')??tokens[0];
      if(!tok)return null;
      const book=books[tok.tokenId]??{bids:[],asks:[]};
      const analysis=analyzeBook(tok.tokenId,book,m.rewards?.minSize??20);
      if(Object.keys(books).length>0&&!analysis.ok)return null;
      // _eventSlug = parent event slug, m.slug = market slug
      // If eventSlug == marketSlug (simple market), use single segment URL
      const marketUrl=m._eventSlug && m._eventSlug!==m.slug
        ? 'https://polymarket.com/event/'+m._eventSlug+'/'+m.slug
        : 'https://polymarket.com/event/'+(m._eventSlug??m.slug);
      return{conditionId:m.conditionId,slug:m.slug,question:m.question,
        category:m.category??'other',endDate:m.endDate,
        minSize:m.rewards?.minSize??m.rewardsMinSize,
        maxSpread:m.rewards?.maxSpread??m.rewardsMaxSpread,
        dailyReward:dailyReward(m),competitionLevel:compLevel(m),
        marketUrl,
        primaryTokenId:tok.tokenId,analysis};
    }).filter(Boolean);
  },[rawMarkets,books,filters]);

  const sorted=useMemo(()=>{
    const fn={reward:m=>m.dailyReward,spread:m=>-m.maxSpread,
      minSize:m=>m.minSize,comp:m=>-m.competitionLevel,pct:m=>m.analysis.pct};
    const f=fn[sortKey]??(m=>m.analysis.pct);
    return[...processed].sort((a,b)=>sortDir*(f(b)-f(a)));
  },[processed,sortKey,sortDir]);

  const toggleSort=key=>{
    if(sortKey===key)setSortDir(d=>-d);
    else{setSortKey(key);setSortDir(-1);}
  };
  const arr=k=>sortKey===k?(sortDir===-1?'↓':'↑'):'↕';

  return<div className="app">

      <div className="hdr-left">
        <div className="logo">

            <circle cx="17.5" cy="17.5" r="3.5" stroke="white" strokeWidth="1.8"/>
          </svg>
        </div>
        <div>
          <div className="app-name">Polymarket Rewards Scanner</div>
          <div className="app-sub">Сканер рынков для ликвидити-провайдеров</div>
        </div>
      </div>
      <div className="live-pill"><div className="live-dot"/>{USE_MOCK?'🧪 Мок-данные':'Live · 30с'}</div>

    {/* Filters */}
    <div className="fp">
      <div className="fp-row">
        <div className="fp-group">
          <div className="fp-label">Мин. размер ставки</div>
          <div className="btn-grp">
            {[20,40,50].map(sz=><button key={sz}
              className={`tog ${filters.sizes.includes(sz)?'on':''}`}
              onClick={()=>setFilters(f=>{
                const has=f.sizes.includes(sz);
                const next=has?f.sizes.filter(s=>s!==sz):[...f.sizes,sz];
                return{...f,sizes:next.length?next:f.sizes};
              })}>{sz}</button>)}
          </div>
        </div>
        <div className="fp-div"/>
        <div className="fp-group">
          <div className="fp-label">Мин. награда в день</div>
          <div className="sld-row">
            <input type="range" min={30} max={200} step={5} value={filters.reward}
              onChange={e=>setFilters(f=>({...f,reward:+e.target.value}))}/>
            <span className="sld-val">≥ ${filters.reward}</span>
          </div>
        </div>
        <div className="fp-div"/>
        <div className="fp-group">
          <div className="fp-label">Макс. спред</div>
          <div className="sld-row">
            <input type="range" min={1} max={5} step={0.5} value={filters.spread}
              onChange={e=>setFilters(f=>({...f,spread:+e.target.value}))}/>
            <span className="sld-val">{'<'} {filters.spread}¢</span>
          </div>
        </div>
        <div className="fp-right">
          <div className={`count-txt ${sorted.length===0&&!loading?'zero':''}`}>
            Найдено: <strong>{loading?'…':sorted.length}</strong> из {rawMarkets.length}
          </div>
          {refetching&&<div className="upd"><div className="spin"/>Обновление...</div>}
        </div>
      </div>

    </div>}

    {loading&&(mode==='table'?<SkeletonTable/>:<SkeletonCards/>)}

    {!loading&&error&&<div className="state-box">
      <div className="state-icon">⚠️</div>
      <div className="state-title">Не удалось загрузить данные</div>
      <div className="state-sub">Проверьте подключение к интернету и попробуйте снова.</div>
      <button className="retry-btn" onClick={()=>{setLoading(true);loadMarkets();}}>Повторить попытку</button>

    {!loading&&!error&&sorted.length===0&&<div className="state-box">
      <div className="state-icon">🔍</div>
      <div className="state-title">Рынки не найдены</div>
      <div className="state-sub">Попробуйте снизить планку суточной награды или выбрать другой размер ставки.</div>
    </div>}

    {/* TABLE */}
    {!loading&&!error&&sorted.length>0&&mode==='table'&&<div className="tbl-wrap">
      <table>
        <colgroup>
          <col className="c-market"/><col className="c-reward"/><col className="c-spread"/>
          <col className="c-min"/><col className="c-comp"/><col className="c-ob"/>
          <col className="c-share"/><col className="c-action"/>
        </colgroup>
        <thead><tr>
          <th>Рынок</th>
          <th onClick={()=>toggleSort('reward')}>Награда <span className={`sort-arrow ${sortKey==='reward'?'on':''}`}>{arr('reward')}</span></th>
          <th onClick={()=>toggleSort('spread')}>Спред <span className={`sort-arrow ${sortKey==='spread'?'on':''}`}>{arr('spread')}</span></th>
          <th onClick={()=>toggleSort('minSize')}>Min <span className={`sort-arrow ${sortKey==='minSize'?'on':''}`}>{arr('minSize')}</span></th>
          <th onClick={()=>toggleSort('comp')}>Конк. <span className={`sort-arrow ${sortKey==='comp'?'on':''}`}>{arr('comp')}</span></th>
          <th title="Зелёный=Bid(покупка), Красный=Ask(продажа). ▲ = наша ставка">Стакан <span style={{fontSize:9,opacity:.5}}>bid|ask</span></th>
          <th className="r" onClick={()=>toggleSort('pct')}>Доля <span className={`sort-arrow ${sortKey==='pct'?'on':''}`}>{arr('pct')}</span></th>
          <th className="r"/>
        </tr></thead>
        <tbody>{sorted.map(m=><TableRow key={m.conditionId} m={m}/>)}</tbody>
      </table>
    </div>}

    {/* CARDS */}
    {!loading&&!error&&sorted.length>0&&mode==='cards'&&<div className="cards-grid">
      {sorted.map(m=><MiniCard key={m.conditionId} m={m}/>)}
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
