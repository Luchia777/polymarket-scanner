<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polymarket Rewards Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#475569;--hint:#94a3b8;
  --green:#10b981;--green-dark:#059669;--green-bg:#d1fae5;--green-text:#065f46;
  --amber-bg:#fef3c7;--amber-text:#92400e;
  --red:#ef4444;--red-bg:#fee2e2;
  --slate:#0f172a;--blue:#4f46e5;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--r-sm:7px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
}
html{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh}

/* ── Layout ── */
.app{max-width:1500px;margin:0 auto;padding:20px 18px}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:var(--slate);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px}
.app-name{font-size:18px;font-weight:700;letter-spacing:-.4px}
.app-sub{font-size:11px;color:var(--hint);font-family:var(--mono)}
.live-pill{display:flex;align-items:center;gap:5px;padding:4px 11px;background:var(--green-bg);border-radius:20px;font-size:11px;font-weight:600;color:var(--green-text)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Filter Panel ── */
.fp{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
.fp-row{display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap}
.fp-group{display:flex;flex-direction:column;gap:6px}
.fp-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--hint)}
.btn-grp{display:flex;gap:4px}
.tog{min-width:46px;min-height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);font-family:var(--font);transition:all .12s}
.tog.on{background:var(--slate);color:#fff;border-color:var(--slate)}
.tog:hover:not(.on){border-color:#94a3b8}
.sld-row{display:flex;align-items:center;gap:10px}
.sld-val{font-size:13px;font-weight:700;color:var(--text);font-family:var(--mono);min-width:64px}
input[type=range]{-webkit-appearance:none;width:140px;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--slate);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.fp-div{width:1px;height:40px;background:var(--border)}
.fp-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.count-txt{font-size:13px;color:var(--muted)}
.count-txt strong{color:var(--text);font-weight:700}
.count-txt.zero strong{color:#f59e0b}
.upd{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--hint);font-family:var(--mono)}
.spin{width:9px;height:9px;border:1.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Mode switcher ── */
.mode-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mode-btn{padding:7px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .12s;display:flex;align-items:center;gap:6px}
.mode-btn.on{background:var(--slate);color:#fff;border-color:var(--slate)}
.mode-btn:hover:not(.on){border-color:#94a3b8}
.sort-hint{font-size:11px;color:var(--hint);margin-left:auto}

/* ── TABLE MODE ── */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:600;color:var(--hint);text-align:left;padding:10px 14px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none;cursor:pointer;background:var(--card)}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--text)}
thead th.r{text-align:right}
.sort-arrow{margin-left:4px;opacity:.5}
.sort-arrow.on{opacity:1}
tbody tr{border-bottom:.5px solid var(--border);cursor:default;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8fafc}
tbody td{padding:9px 14px;font-size:13px;vertical-align:middle}
.cat-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:#f1f5f9;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.q-cell{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.mono{font-family:var(--mono);font-size:12px}
.g{color:var(--green-dark);font-weight:600}
.dots-row{display:flex;gap:3px;align-items:center}
.d{width:7px;height:7px;border-radius:50%}
.d.on{background:var(--green)}
.d.off{background:var(--border)}
.mini-ob{display:flex;align-items:center;gap:2px}
.ob-bar{height:10px;border-radius:2px}
.ob-bar.ask{background:#fca5a5}
.ob-bar.bid{background:#6ee7b7}
.ob-div{width:1px;height:10px;background:var(--border);flex-shrink:0}
.chip{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:20px;white-space:nowrap}
.chip.g{background:var(--green-bg);color:var(--green-text)}
.chip.a{background:var(--amber-bg);color:var(--amber-text)}
.open-btn-sm{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--green);color:#fff;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;border:none;cursor:pointer;font-family:var(--font);transition:background .12s}
.open-btn-sm:hover{background:var(--green-dark)}

/* ── CARD MODE ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:0;overflow:hidden;transition:box-shadow .15s,transform .15s;page-break-inside:avoid}
.mcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.mcard.best{border:1.5px solid var(--green)}
.mc-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px 0}
.mc-q{padding:5px 12px 8px;font-size:13px;font-weight:600;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mc-stats{display:flex;gap:0;padding:0 12px 8px;flex-wrap:wrap;gap:8px}
.mc-stat{display:flex;flex-direction:column;gap:1px}
.mc-stat-k{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.04em}
.mc-stat-v{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text)}
.mc-stat-v.g{color:var(--green-dark)}
.mc-sep{height:.5px;background:var(--border);margin:0 12px}
.mc-comp{display:flex;align-items:center;gap:6px;padding:7px 12px}
.comp-lbl{font-size:10px;font-weight:600}
.comp-lbl.ok{color:var(--green-dark)}
.comp-lbl.bad{color:var(--red)}
.mc-ob-mini{padding:6px 12px;background:#fafbfc;border-top:.5px solid var(--border)}
.mc-ob-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.mc-ob-price{font-size:9px;font-family:var(--mono);min-width:32px;text-align:right}
.mc-ob-price.a{color:var(--red)}
.mc-ob-price.b{color:var(--green-dark)}
.mc-ob-bar{height:8px;border-radius:2px}
.mc-ob-bar.ask{background:#fecaca}
.mc-ob-bar.bid{background:#bbf7d0}
.mc-ob-sz{font-size:9px;color:var(--hint);font-family:var(--mono)}
.mc-stake{font-size:9px;font-weight:600;color:var(--blue);padding:2px 0;border-top:1.5px dashed var(--blue);border-bottom:1.5px dashed var(--blue);margin:3px 0}
.mc-ob-sep{display:flex;align-items:center;gap:4px;padding:2px 0}
.mc-ob-line{flex:1;height:.5px;background:var(--border)}
.mc-ob-spread{font-size:9px;font-family:var(--mono);color:var(--hint)}
.mc-footer{padding:8px 12px 10px}
.open-btn-full{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;background:var(--green);color:#fff;border-radius:var(--r-sm);font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:var(--font);transition:background .12s}
.open-btn-full:hover{background:var(--green-dark)}

/* ── Skeleton ── */
.skel{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:4px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}

/* ── States ── */
.state-box{display:flex;flex-direction:column;align-items:center;padding:60px 24px;text-align:center;gap:14px}
.state-icon{font-size:44px}
.state-title{font-size:17px;font-weight:700}
.state-sub{font-size:13px;color:var(--muted);max-width:360px;line-height:1.6}
.retry-btn{padding:9px 22px;background:var(--slate);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}

/* ── Responsive ── */
@media(max-width:640px){
  .app{padding:12px 10px}
  .fp-div{display:none}
  .fp-row{gap:12px}
  input[type=range]{width:100px}
  .cards-grid{grid-template-columns:1fr}
  .q-cell{max-width:140px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ═══ CONSTANTS ═══════════════════════════════════════════════
const EXCL=['politics','middle-east','геополитика','iran','ближний восток'];
const ALLOWED=[20,40,50];
const USE_MOCK=true;
const CAT={crypto:'Крипто',cryptocurrency:'Крипто',sports:'Спорт',sport:'Спорт',
  esports:'Киберспорт',finance:'Финансы',science:'Наука',culture:'Культура',
  technology:'Технологии',other:'Прочее'};

// ═══ MOCK DATA ════════════════════════════════════════════════
const MOCK_MARKETS=[
  {conditionId:'m1',slug:'btc-below-60k-june',question:'Опустится ли Bitcoin ниже $60 000 до конца июня 2025?',category:'crypto',endDate:'2025-06-30T23:59:59Z',rewards:{minSize:20,maxSpread:2.2,rates:[{rewardsDailyRate:45}]},tokens:[{tokenId:'t1',outcome:'Yes',price:.063},{tokenId:'t1n',outcome:'No',price:.937}],volume:12500,liquidity:320,active:true,closed:false},
  {conditionId:'m2',slug:'eth-etf-approved-q2',question:'Будет ли одобрен спотовый ETH ETF в США до конца Q2 2025?',category:'crypto',endDate:'2025-06-30T23:59:59Z',rewards:{minSize:40,maxSpread:3.0,rates:[{rewardsDailyRate:62}]},tokens:[{tokenId:'t2',outcome:'Yes',price:.19},{tokenId:'t2n',outcome:'No',price:.81}],volume:45000,liquidity:1800,active:true,closed:false},
  {conditionId:'m3',slug:'team-liquid-esl-pro-league-s21',question:'Выиграет ли Team Liquid ESL Pro League Season 21?',category:'esports',endDate:'2025-06-15T23:59:59Z',rewards:{minSize:20,maxSpread:4.0,rates:[{rewardsDailyRate:35}]},tokens:[{tokenId:'t3',outcome:'Yes',price:.22},{tokenId:'t3n',outcome:'No',price:.78}],volume:3500,liquidity:210,active:true,closed:false},
  {conditionId:'m4',slug:'fed-rate-cut-june-2025',question:'Снизит ли ФРС ставку на заседании в июне 2025?',category:'finance',endDate:'2025-06-18T23:59:59Z',rewards:{minSize:50,maxSpread:2.0,rates:[{rewardsDailyRate:78}]},tokens:[{tokenId:'t4',outcome:'Yes',price:.41},{tokenId:'t4n',outcome:'No',price:.59}],volume:98000,liquidity:11500,active:true,closed:false},
  {conditionId:'m5',slug:'nba-celtics-champion-2025',question:'Станут ли Boston Celtics чемпионами NBA в сезоне 2024–25?',category:'sports',endDate:'2025-06-25T23:59:59Z',rewards:{minSize:20,maxSpread:3.5,rates:[{rewardsDailyRate:52}]},tokens:[{tokenId:'t5',outcome:'Yes',price:.34},{tokenId:'t5n',outcome:'No',price:.66}],volume:67000,liquidity:4600,active:true,closed:false},
  {conditionId:'m6',slug:'sol-above-200-june',question:'Превысит ли цена Solana отметку $200 до конца июня 2025?',category:'crypto',endDate:'2025-06-30T23:59:59Z',rewards:{minSize:40,maxSpread:4.5,rates:[{rewardsDailyRate:38}]},tokens:[{tokenId:'t6',outcome:'Yes',price:.28},{tokenId:'t6n',outcome:'No',price:.72}],volume:21000,liquidity:1450,active:true,closed:false},
  {conditionId:'m7',slug:'bnb-above-600-june',question:'Превысит ли BNB отметку $600 до конца июня 2025?',category:'crypto',endDate:'2025-06-30T23:59:59Z',rewards:{minSize:20,maxSpread:3.0,rates:[{rewardsDailyRate:41}]},tokens:[{tokenId:'t7',outcome:'Yes',price:.15},{tokenId:'t7n',outcome:'No',price:.85}],volume:8400,liquidity:490,active:true,closed:false},
  {conditionId:'m8',slug:'nhl-playoffs-oilers-2025',question:'Выйдут ли Edmonton Oilers в финал Кубка Стэнли 2025?',category:'sports',endDate:'2025-06-10T23:59:59Z',rewards:{minSize:20,maxSpread:4.0,rates:[{rewardsDailyRate:33}]},tokens:[{tokenId:'t8',outcome:'Yes',price:.44},{tokenId:'t8n',outcome:'No',price:.56}],volume:15000,liquidity:870,active:true,closed:false},
  {conditionId:'m9',slug:'xrp-sec-case-resolved',question:'Будет ли дело SEC против Ripple полностью закрыто до конца 2025?',category:'crypto',endDate:'2025-12-31T23:59:59Z',rewards:{minSize:40,maxSpread:2.5,rates:[{rewardsDailyRate:55}]},tokens:[{tokenId:'t9',outcome:'Yes',price:.67},{tokenId:'t9n',outcome:'No',price:.33}],volume:34000,liquidity:2100,active:true,closed:false},
  {conditionId:'m10',slug:'dota2-ti-team-spirit',question:'Выиграет ли Team Spirit The International 2025 по Dota 2?',category:'esports',endDate:'2025-10-31T23:59:59Z',rewards:{minSize:20,maxSpread:3.5,rates:[{rewardsDailyRate:30}]},tokens:[{tokenId:'t10',outcome:'Yes',price:.09},{tokenId:'t10n',outcome:'No',price:.91}],volume:5600,liquidity:380,active:true,closed:false},
];

const MOCK_BOOKS={
  t1:{bids:[{price:.041,size:60},{price:.040,size:104},{price:.029,size:7},{price:.028,size:68},{price:.025,size:120}],asks:[{price:.063,size:660},{price:.064,size:30},{price:.068,size:31},{price:.078,size:41},{price:.090,size:22}]},
  t2:{bids:[{price:.18,size:45},{price:.17,size:120},{price:.16,size:80},{price:.15,size:200},{price:.14,size:55}],asks:[{price:.21,size:35},{price:.22,size:90},{price:.23,size:150},{price:.24,size:70},{price:.25,size:40}]},
  t3:{bids:[{price:.20,size:25},{price:.18,size:55},{price:.16,size:30},{price:.15,size:80},{price:.13,size:45}],asks:[{price:.24,size:20},{price:.25,size:60},{price:.26,size:35},{price:.27,size:90},{price:.28,size:25}]},
  t4:{bids:[{price:.40,size:1800},{price:.39,size:3500},{price:.38,size:5000},{price:.37,size:2200},{price:.36,size:8000}],asks:[{price:.42,size:2000},{price:.43,size:4500},{price:.44,size:3000}]},
  t5:{bids:[{price:.33,size:55},{price:.32,size:130},{price:.31,size:80},{price:.30,size:210},{price:.29,size:45}],asks:[{price:.36,size:40},{price:.37,size:95},{price:.38,size:160}]},
  t6:{bids:[{price:.27,size:38},{price:.26,size:95},{price:.25,size:55},{price:.24,size:140},{price:.23,size:70}],asks:[{price:.29,size:30},{price:.30,size:80},{price:.31,size:120}]},
  t7:{bids:[{price:.14,size:32},{price:.13,size:78},{price:.12,size:45}],asks:[{price:.17,size:25},{price:.18,size:60},{price:.19,size:40}]},
  t8:{bids:[{price:.43,size:48},{price:.42,size:110},{price:.41,size:65}],asks:[{price:.47,size:35},{price:.48,size:88},{price:.49,size:55}]},
  t9:{bids:[{price:.66,size:40},{price:.65,size:95},{price:.64,size:55}],asks:[{price:.68,size:30},{price:.69,size:75},{price:.70,size:50}]},
  t10:{bids:[{price:.08,size:28},{price:.07,size:65},{price:.06,size:42}],asks:[{price:.11,size:22},{price:.12,size:50},{price:.13,size:35}]},
};

// ═══ SERVICES ════════════════════════════════════════════════
function dailyReward(m){return(m.rewards?.rates??[]).reduce((s,r)=>s+(r.rewardsDailyRate??0),0)}
function compLevel(m){const l=m.liquidity??0;return l<500?1:l<2000?2:l<8000?3:l<25000?4:5}
function eligible(m,f){
  const cat=(m.category??'').toLowerCase();
  if(EXCL.some(e=>cat.includes(e)))return false;
  const ms=m.rewards?.minSize;
  if(!ALLOWED.includes(ms))return false;
  if(!f.sizes.includes(ms))return false;
  if(dailyReward(m)<f.reward)return false;
  if((m.rewards?.maxSpread??99)>=f.spread)return false;
  if(compLevel(m)>2)return false;
  return true;
}
function analyzeBook(tokenId,book,minSize){
  const empty={tokenId,bestBidPrice:0,bestAskPrice:0,spread:0,topBidVolume:0,ourStakeUSD:0,pct:0,hasDom:false,ok:false,bids:[],asks:[]};
  if(!book?.bids?.length||!book?.asks?.length)return empty;
  const bids=[...book.bids].filter(b=>b.price>0&&b.size>0).sort((a,b)=>b.price-a.price);
  const asks=[...book.asks].filter(a=>a.price>0&&a.size>0).sort((a,b)=>a.price-b.price);
  if(!bids.length||!asks.length)return empty;
  const bb=bids[0],ba=asks[0];
  const vol=bb.size*bb.price;
  const stake=minSize*bb.price;
  const pct=vol>0?(stake/vol)*100:0;
  const hasDom=bids.some(b=>b.size*b.price>500);
  return{tokenId,bestBidPrice:bb.price,bestAskPrice:ba.price,spread:ba.price-bb.price,
    topBidVolume:vol,ourStakeUSD:stake,pct,hasDom,
    ok:vol<300&&pct>=5&&!hasDom,bids:bids.slice(0,5),asks:asks.slice(0,5)};
}

// ═══ API ══════════════════════════════════════════════════════
async function fetchMarkets(){
  if(USE_MOCK){await new Promise(r=>setTimeout(r,800));return MOCK_MARKETS;}
  const res=await fetch('https://gamma-api.polymarket.com/markets?rewards_min_size=1&limit=100&active=true&closed=false');
  if(!res.ok)throw new Error('HTTP '+res.status);
  const d=await res.json();return Array.isArray(d)?d:(d.data??[]);
}
async function fetchBook(tid){
  if(USE_MOCK){await new Promise(r=>setTimeout(r,200));return MOCK_BOOKS[tid]??{bids:[],asks:[]};}
  const res=await fetch('https://clob.polymarket.com/book?token_id='+tid);
  if(!res.ok)throw new Error('CLOB '+res.status);
  const d=await res.json();
  return{bids:(d.bids??[]).map(b=>({price:parseFloat(b.price),size:parseFloat(b.size)})),
         asks:(d.asks??[]).map(a=>({price:parseFloat(a.price),size:parseFloat(a.size)}))};
}

// ═══ COMPONENTS ══════════════════════════════════════════════

function Dots({level}){
  const ok=level<=2;
  return <div className="dots-row">
    {[1,2,3,4,5].map(i=><div key={i} className={`d ${i<=level?(ok?'on':'off'):''}`}/>)}
  </div>;
}

function MiniOB({bids,asks}){
  if(!bids.length&&!asks.length)return<span style={{fontSize:10,color:'var(--hint)'}}>—</span>;
  const allV=[...bids,...asks].map(l=>l.size*l.price);
  const mx=Math.max(...allV,.01);
  const w=l=>Math.max(6,Math.min(40,(l.size*l.price/mx)*40));
  return<div className="mini-ob">
    {[...asks].reverse().slice(0,3).map((l,i)=><div key={i} className="ob-bar ask" style={{width:w(l)+'px'}}/>)}
    <div className="ob-div"/>
    {bids.slice(0,3).map((l,i)=><div key={i} className="ob-bar bid" style={{width:w(l)+'px'}}/>)}
  </div>;
}

// TABLE ROW
function TableRow({m}){
  const catLabel=CAT[(m.category??'').toLowerCase()]??m.category??'Прочее';
  const chipCls=m.analysis.pct>=19?'chip g':'chip a';
  return<tr>
    <td><div style={{display:'flex',alignItems:'center',gap:7}}>
      <span className="cat-pill">{catLabel}</span>
      <span className="q-cell" title={m.question}>{m.question}</span>
    </div></td>
    <td><span className="mono g">${m.dailyReward.toFixed(0)}/д</span></td>
    <td><span className="mono">{(m.maxSpread).toFixed(1)}¢</span></td>
    <td><span className="mono">{m.minSize}</span></td>
    <td><Dots level={m.competitionLevel}/></td>
    <td><MiniOB bids={m.analysis.bids} asks={m.analysis.asks}/></td>
    <td style={{textAlign:'right'}}><span className={chipCls}>{m.analysis.pct.toFixed(0)}%</span></td>
    <td style={{textAlign:'right'}}>
      <a className="open-btn-sm" href={m.marketUrl} target="_blank" rel="noopener noreferrer">
        Открыть ↗
      </a>
    </td>
  </tr>;
}

// COMPACT CARD
function MiniCard({m}){
  const catLabel=CAT[(m.category??'').toLowerCase()]??m.category??'Прочее';
  const chipCls=m.analysis.pct>=19?'chip g':'chip a';
  const a=m.analysis;
  const allV=[...a.bids,...a.asks].map(l=>l.size*l.price);
  const mx=Math.max(...allV,.01);
  const bw=l=>Math.max(4,Math.min(60,(l.size*l.price/mx)*60));
  const fmt=n=>n<.01?n.toFixed(4):n<1?n.toFixed(3):n.toFixed(2);
  return<div className={`mcard ${m.analysis.pct>=19?'best':''}`}>
    <div className="mc-head">
      <span className="cat-pill">{catLabel}</span>
      <span className={chipCls}>{m.analysis.pct.toFixed(0)}% доля</span>
    </div>
    <div className="mc-q">{m.question}</div>
    <div className="mc-stats">
      <div className="mc-stat"><div className="mc-stat-k">Награда</div><div className="mc-stat-v g">${m.dailyReward.toFixed(0)}/д</div></div>
      <div className="mc-stat"><div className="mc-stat-k">Спред</div><div className="mc-stat-v">{m.maxSpread.toFixed(1)}¢</div></div>
      <div className="mc-stat"><div className="mc-stat-k">Min</div><div className="mc-stat-v">{m.minSize}д</div></div>
      <div className="mc-stat"><div className="mc-stat-k">Bid</div><div className="mc-stat-v">{(a.bestBidPrice*100).toFixed(1)}¢</div></div>
    </div>
    <div className="mc-sep"/>
    <div className="mc-comp">
      <Dots level={m.competitionLevel}/>
      <span className={`comp-lbl ok`}>{['','Оч.низкая','Низкая','Средняя','Высокая','Оч.высокая'][m.competitionLevel]}</span>
    </div>
    {a.bids.length>0&&<>
      <div className="mc-sep"/>
      <div className="mc-ob-mini">
        {[...a.asks].reverse().slice(0,3).map((l,i)=><div key={i} className="mc-ob-row">
          <span className="mc-ob-price a">{fmt(l.price)}</span>
          <div className="mc-ob-bar ask" style={{width:bw(l)+'px'}}/>
          <span className="mc-ob-sz">{l.size.toFixed(0)}д</span>
        </div>)}
        <div className="mc-ob-sep"><div className="mc-ob-line"/><span className="mc-ob-spread">спред {(a.spread*100).toFixed(1)}¢</span><div className="mc-ob-line"/></div>
        <div className="mc-stake">▶ Наша ставка {m.minSize}д — {a.pct.toFixed(0)}% уровня</div>
        {a.bids.slice(0,3).map((l,i)=><div key={i} className="mc-ob-row">
          <span className="mc-ob-price b">{fmt(l.price)}</span>
          <div className="mc-ob-bar bid" style={{width:bw(l)+'px'}}/>
          <span className="mc-ob-sz">{l.size.toFixed(0)}д</span>
        </div>)}
      </div>
    </>}
    <div className="mc-footer">
      <a className="open-btn-full" href={m.marketUrl} target="_blank" rel="noopener noreferrer">
        Открыть рынок ↗
      </a>
    </div>
  </div>;
}

function SkeletonTable(){
  return<div className="tbl-wrap"><table><tbody>
    {[0,1,2,3,4,5].map(i=><tr key={i}>
      {[280,60,50,40,70,80,50,80].map((w,j)=><td key={j}><div className="skel" style={{height:12,width:w}}/></td>)}
    </tr>)}
  </tbody></table></div>;
}

function SkeletonCards(){
  return<div className="cards-grid">
    {[0,1,2,3,4,5].map(i=><div key={i} className="skel-card">
      <div className="skel" style={{height:9,width:'38%',marginBottom:8}}/>
      <div className="skel" style={{height:13,width:'92%',marginBottom:5}}/>
      <div className="skel" style={{height:13,width:'68%',marginBottom:10}}/>
      <div className="skel" style={{height:40,borderRadius:6,marginBottom:8}}/>
      <div className="skel" style={{height:32,borderRadius:6}}/>
    </div>)}
  </div>;
}

// ═══ APP ═════════════════════════════════════════════════════
function App(){
  const [filters,setFilters]=useState({sizes:[20,40,50],reward:30,spread:5});
  const [mode,setMode]=useState('table'); // 'table' | 'cards'
  const [sortKey,setSortKey]=useState('pct');
  const [sortDir,setSortDir]=useState(-1); // -1=desc, 1=asc
  const [rawMarkets,setRaw]=useState([]);
  const [books,setBooks]=useState({});
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [refetching,setRefetching]=useState(false);
  const refT=useRef(null),bookT=useRef(null);

  const loadMarkets=useCallback(async()=>{
    try{setError(null);const d=await fetchMarkets();setRaw(d);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{
    loadMarkets();
    refT.current=setInterval(loadMarkets,300000);
    return()=>clearInterval(refT.current);
  },[loadMarkets]);

  const loadBooks=useCallback(async(markets)=>{
    if(!markets.length)return;
    setRefetching(true);
    const top=markets.slice(0,15);
    await Promise.allSettled(top.map(async m=>{
      const tok=m.tokens.find(t=>t.outcome.toLowerCase()==='yes')??m.tokens[0];
      if(!tok)return;
      try{const b=await fetchBook(tok.tokenId);setBooks(p=>({...p,[tok.tokenId]:b}));}catch{}
    }));
    setRefetching(false);
  },[]);

  useEffect(()=>{
    if(rawMarkets.length){loadBooks(rawMarkets);bookT.current=setInterval(()=>loadBooks(rawMarkets),30000);}
    return()=>clearInterval(bookT.current);
  },[rawMarkets,loadBooks]);

  const processed=useMemo(()=>{
    return rawMarkets
      .filter(m=>eligible(m,filters))
      .map(m=>{
        const tok=m.tokens.find(t=>t.outcome.toLowerCase()==='yes')??m.tokens[0];
        if(!tok)return null;
        const book=books[tok.tokenId]??{bids:[],asks:[]};
        const analysis=analyzeBook(tok.tokenId,book,m.rewards?.minSize??20);
        const booksLoaded=Object.keys(books).length>0;
        if(booksLoaded&&!analysis.ok)return null;
        return{
          conditionId:m.conditionId,slug:m.slug,question:m.question,
          category:m.category??'other',endDate:m.endDate,
          minSize:m.rewards?.minSize,maxSpread:m.rewards?.maxSpread,
          dailyReward:dailyReward(m),competitionLevel:compLevel(m),
          marketUrl:'https://polymarket.com/event/'+m.slug,
          primaryTokenId:tok.tokenId,analysis,
        };
      })
      .filter(Boolean);
  },[rawMarkets,books,filters]);

  const sorted=useMemo(()=>{
    const keyFn={
      reward:m=>m.dailyReward,
      spread:m=>-m.maxSpread,
      minSize:m=>m.minSize,
      comp:m=>-m.competitionLevel,
      pct:m=>m.analysis.pct,
    };
    const fn=keyFn[sortKey]??(m=>m.analysis.pct);
    return[...processed].sort((a,b)=>sortDir*(fn(b)-fn(a)));
  },[processed,sortKey,sortDir]);

  const toggleSort=key=>{
    if(sortKey===key)setSortDir(d=>-d);
    else{setSortKey(key);setSortDir(-1);}
  };

  const arr=s=>sortKey===s?(sortDir===-1?'↓':'↑'):'↕';

  const preFiltered=rawMarkets.filter(m=>eligible(m,filters));

  return<div className="app">
    {/* Header */}
    <div className="hdr">
      <div className="hdr-left">
        <div className="logo">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 3h7v7H3V3zM14 3h7v7h-7V3zM3 14h7v7H3v-7z" stroke="white" strokeWidth="1.8" strokeLinejoin="round"/>
            <circle cx="17.5" cy="17.5" r="3.5" stroke="white" strokeWidth="1.8"/>
          </svg>
        </div>
        <div>
          <div className="app-name">Polymarket Rewards Scanner</div>
          <div className="app-sub">Сканер рынков для ликвидити-провайдеров</div>
        </div>
      </div>
      <div className="live-pill">
        <div className="live-dot"/>
        Live · Обновление каждые 30с
      </div>
    </div>

    {/* Filters */}
    <div className="fp">
      <div className="fp-row">
        <div className="fp-group">
          <div className="fp-label">Мин. размер ставки</div>
          <div className="btn-grp">
            {[20,40,50].map(sz=><button key={sz}
              className={`tog ${filters.sizes.includes(sz)?'on':''}`}
              onClick={()=>setFilters(f=>{
                const has=f.sizes.includes(sz);
                const next=has?f.sizes.filter(s=>s!==sz):[...f.sizes,sz];
                return{...f,sizes:next.length?next:f.sizes};
              })}>
              {sz}
            </button>)}
          </div>
        </div>
        <div className="fp-div"/>
        <div className="fp-group">
          <div className="fp-label">Мин. награда в день</div>
          <div className="sld-row">
            <input type="range" min={30} max={200} step={5} value={filters.reward}
              onChange={e=>setFilters(f=>({...f,reward:+e.target.value}))}/>
            <span className="sld-val">≥ ${filters.reward}</span>
          </div>
        </div>
        <div className="fp-div"/>
        <div className="fp-group">
          <div className="fp-label">Макс. спред</div>
          <div className="sld-row">
            <input type="range" min={1} max={5} step={0.5} value={filters.spread}
              onChange={e=>setFilters(f=>({...f,spread:+e.target.value}))}/>
            <span className="sld-val">{'<'} {filters.spread}¢</span>
          </div>
        </div>
        <div className="fp-right">
          <div className={`count-txt ${sorted.length===0&&!loading?'zero':''}`}>
            Найдено рынков: <strong>{loading?'…':sorted.length}</strong> из {rawMarkets.length}
          </div>
          {refetching&&<div className="upd"><div className="spin"/>Обновление стакана...</div>}
        </div>
      </div>
    </div>

    {/* Mode switcher */}
    {!loading&&!error&&<div className="mode-bar">
      <button className={`mode-btn ${mode==='table'?'on':''}`} onClick={()=>setMode('table')}>
        ☰ Таблица
      </button>
      <button className={`mode-btn ${mode==='cards'?'on':''}`} onClick={()=>setMode('cards')}>
        ⊞ Карточки
      </button>
      {mode==='table'&&<span className="sort-hint">Кликни на заголовок столбца для сортировки</span>}
    </div>}

    {/* Loading */}
    {loading&&(mode==='table'?<SkeletonTable/>:<SkeletonCards/>)}

    {/* Error */}
    {!loading&&error&&<div className="state-box">
      <div className="state-icon">⚠️</div>
      <div className="state-title">Не удалось загрузить данные</div>
      <div className="state-sub">Проверьте подключение к интернету и попробуйте снова.</div>
      <button className="retry-btn" onClick={()=>{setLoading(true);loadMarkets();}}>Повторить попытку</button>
    </div>}

    {/* Empty */}
    {!loading&&!error&&sorted.length===0&&<div className="state-box">
      <div className="state-icon">🔍</div>
      <div className="state-title">Рынки не найдены</div>
      <div className="state-sub">Попробуйте снизить планку суточной награды или выбрать другой размер ставки.</div>
    </div>}

    {/* Table mode */}
    {!loading&&!error&&sorted.length>0&&mode==='table'&&<div className="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th onClick={()=>toggleSort('q')} style={{minWidth:320}}>Рынок</th>
            <th onClick={()=>toggleSort('reward')}>Награда <span className={`sort-arrow ${sortKey==='reward'?'on':''}`}>{arr('reward')}</span></th>
            <th onClick={()=>toggleSort('spread')}>Спред <span className={`sort-arrow ${sortKey==='spread'?'on':''}`}>{arr('spread')}</span></th>
            <th onClick={()=>toggleSort('minSize')}>Min <span className={`sort-arrow ${sortKey==='minSize'?'on':''}`}>{arr('minSize')}</span></th>
            <th onClick={()=>toggleSort('comp')}>Конк. <span className={`sort-arrow ${sortKey==='comp'?'on':''}`}>{arr('comp')}</span></th>
            <th>Стакан</th>
            <th className="r" onClick={()=>toggleSort('pct')}>Доля <span className={`sort-arrow ${sortKey==='pct'?'on':''}`}>{arr('pct')}</span></th>
            <th className="r">Действие</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(m=><TableRow key={m.conditionId} m={m}/>)}
        </tbody>
      </table>
    </div>}

    {/* Cards mode */}
    {!loading&&!error&&sorted.length>0&&mode==='cards'&&<div className="cards-grid">
      {sorted.map(m=><MiniCard key={m.conditionId} m={m}/>)}
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
