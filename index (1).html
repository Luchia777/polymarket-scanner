<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polymarket Rewards Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;
  --card:#ffffff;
  --border:#e2e8f0;
  --text-primary:#0f172a;
  --text-secondary:#475569;
  --text-muted:#94a3b8;
  --emerald:#10b981;
  --emerald-dark:#059669;
  --emerald-light:#d1fae5;
  --emerald-text:#065f46;
  --amber-light:#fef3c7;
  --amber-text:#92400e;
  --red:#ef4444;
  --red-light:#fee2e2;
  --red-text:#991b1b;
  --slate-900:#0f172a;
  --blue-accent:#4f46e5;
  --font-mono:'JetBrains Mono',monospace;
  --font-sans:'DM Sans',sans-serif;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow-hover:0 4px 12px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.06);
}
html{font-family:var(--font-sans);background:var(--bg);color:var(--text-primary);-webkit-font-smoothing:antialiased}
body{min-height:100vh}
#root{min-height:100vh}

/* Layout */
.app{max-width:1400px;margin:0 auto;padding:24px 20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:var(--slate-900);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;color:#fff}
.app-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--text-primary)}
.app-subtitle{font-size:13px;color:var(--text-muted);font-family:var(--font-mono)}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 11px;background:var(--emerald-light);border-radius:20px;font-size:12px;font-weight:600;color:var(--emerald-text)}
.live-dot{width:7px;height:7px;background:var(--emerald);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}

/* Filter Panel */
.filter-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;box-shadow:var(--shadow)}
.filter-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:8px}
.filter-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
.btn-group{display:flex;gap:6px}
.toggle-btn{min-width:52px;min-height:44px;padding:0 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s ease;background:var(--card);color:var(--text-secondary);font-family:var(--font-sans)}
.toggle-btn.active{background:var(--slate-900);color:#fff;border-color:var(--slate-900)}
.toggle-btn:hover:not(.active){border-color:#94a3b8;background:#f8fafc}
.slider-wrap{display:flex;align-items:center;gap:12px}
.slider-val{font-size:15px;font-weight:700;color:var(--text-primary);font-family:var(--font-mono);min-width:80px;white-space:nowrap}
input[type=range]{-webkit-appearance:none;width:180px;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--slate-900);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.filter-divider{width:1px;height:44px;background:var(--border)}
.found-count{font-size:13px;color:var(--text-secondary);margin-left:auto}
.found-count strong{color:var(--text-primary);font-weight:700}
.found-count.zero strong{color:#f59e0b}
.update-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
.spinner{width:10px;height:10px;border:1.5px solid var(--border);border-top-color:var(--emerald);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Grid */
.markets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px}

/* Market Card */
.market-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);transition:box-shadow .2s ease,transform .2s ease;overflow:hidden;display:flex;flex-direction:column;page-break-inside:avoid}
.market-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 16px 0}
.card-category{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.share-badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--font-mono);white-space:nowrap}
.share-badge.green{background:var(--emerald-light);color:var(--emerald-text)}
.share-badge.amber{background:var(--amber-light);color:var(--amber-text)}
.card-question{padding:8px 16px 12px;font-size:14px;font-weight:600;line-height:1.45;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{padding:0 16px 12px;display:flex;flex-direction:column;gap:6px}
.meta-row{display:flex;align-items:center;justify-content:space-between}
.meta-label{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.meta-value{font-size:12px;font-weight:600;color:var(--text-primary);font-family:var(--font-mono)}
.meta-value.reward{color:var(--emerald-dark)}
.card-divider{height:1px;background:var(--border);margin:0 16px}
.card-competition{padding:12px 16px}
.competition-wrap{display:flex;align-items:center;gap:10px}
.competition-dots{display:flex;gap:4px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--border)}
.dot.filled-ok{background:var(--emerald)}
.dot.filled-bad{background:#e2e8f0}
.competition-label{font-size:11px;font-weight:600}
.competition-label.ok{color:var(--emerald-dark)}
.competition-label.bad{color:var(--red)}

/* Order Book Preview */
.orderbook{padding:12px 16px;background:#fafbfc;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.ob-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.ob-section{margin-bottom:8px}
.ob-section-label{font-size:10px;font-weight:600;margin-bottom:4px;font-family:var(--font-mono)}
.ob-section-label.bids{color:var(--emerald-dark)}
.ob-section-label.asks{color:var(--red)}
.ob-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;position:relative}
.ob-bar-wrap{flex:1;height:18px;border-radius:3px;overflow:hidden;background:#f1f5f9;position:relative}
.ob-bar{height:100%;border-radius:3px;transition:width .3s ease}
.ob-bar.bid{background:linear-gradient(90deg,#bbf7d0,#6ee7b7)}
.ob-bar.ask{background:linear-gradient(90deg,#fecaca,#fca5a5)}
.ob-price{font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--text-primary);min-width:34px;text-align:right}
.ob-size{font-size:9px;font-family:var(--font-mono);color:var(--text-muted);min-width:42px}
.ob-our-stake{display:flex;align-items:center;gap:6px;padding:5px 0;border-top:1.5px dashed var(--blue-accent);border-bottom:1.5px dashed var(--blue-accent);margin:4px 0}
.ob-our-stake-label{font-size:10px;font-weight:600;color:var(--blue-accent);white-space:nowrap}
.ob-separator{display:flex;align-items:center;gap:6px;padding:4px 0;margin:4px 0}
.ob-spread-line{flex:1;height:1px;background:var(--border)}
.ob-spread-val{font-size:10px;font-family:var(--font-mono);color:var(--text-muted)}

/* Open button */
.card-footer{padding:12px 16px 16px;margin-top:auto}
.open-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px 16px;background:var(--emerald);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s ease;font-family:var(--font-sans)}
.open-btn:hover{background:var(--emerald-dark)}
.open-btn svg{width:14px;height:14px;flex-shrink:0}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.skel-line{border-radius:4px;margin-bottom:8px}

/* Empty & Error states */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;text-align:center;gap:16px}
.state-icon{font-size:48px;line-height:1}
.state-title{font-size:18px;font-weight:700;color:var(--text-primary)}
.state-sub{font-size:14px;color:var(--text-secondary);max-width:380px;line-height:1.6}
.retry-btn{padding:10px 24px;background:var(--slate-900);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-sans)}
.retry-btn:hover{background:#1e293b}

/* Responsive */
@media(max-width:640px){
  .app{padding:16px 12px}
  .filter-row{gap:16px}
  .filter-divider{display:none}
  .markets-grid{grid-template-columns:1fr}
  input[type=range]{width:130px}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ═══════════════════════════════════════════════
// CONSTANTS & TYPES
// ═══════════════════════════════════════════════

const EXCLUDED_CATEGORIES = ['politics','middle-east','геополитика','iran','ближний восток'];
const ALLOWED_MIN_SIZES = [20, 40, 50];
const GAMMA_API = 'https://gamma-api.polymarket.com';
const CLOB_API = 'https://clob.polymarket.com';
const USE_MOCK = true; // set false to use live API

const CATEGORY_LABELS = {

  science: 'Наука',
  culture: 'Культура',
  technology: 'Технологии',

};

// ═══════════════════════════════════════════════
// MOCK DATA
// ═══════════════════════════════════════════════

const MOCK_MARKETS = [

    tokens:[{tokenId:'tok_sol_yes',outcome:'Yes',price:0.28},{tokenId:'tok_sol_no',outcome:'No',price:0.72}],
    volume:21000, liquidity:1450, active:true, closed:false,
  },

const MOCK_BOOKS = {
  tok_btc_yes:{ bids:[{price:0.041,size:60},{price:0.040,size:104},{price:0.029,size:7},{price:0.028,size:68},{price:0.025,size:120}], asks:[{price:0.063,size:660},{price:0.064,size:30},{price:0.068,size:31},{price:0.078,size:41},{price:0.090,size:22}] },
  tok_eth_yes:{ bids:[{price:0.18,size:45},{price:0.17,size:120},{price:0.16,size:80},{price:0.15,size:200},{price:0.14,size:55}], asks:[{price:0.21,size:35},{price:0.22,size:90},{price:0.23,size:150},{price:0.24,size:70},{price:0.25,size:40}] },

  tok_fed_yes:{ bids:[{price:0.40,size:1800},{price:0.39,size:3500},{price:0.38,size:5000},{price:0.37,size:2200},{price:0.36,size:8000}], asks:[{price:0.42,size:2000},{price:0.43,size:4500},{price:0.44,size:3000},{price:0.45,size:1800},{price:0.46,size:6000}] },
  tok_cel_yes:{ bids:[{price:0.33,size:55},{price:0.32,size:130},{price:0.31,size:80},{price:0.30,size:210},{price:0.29,size:45}], asks:[{price:0.36,size:40},{price:0.37,size:95},{price:0.38,size:160},{price:0.39,size:70},{price:0.40,size:35}] },
  tok_sol_yes:{ bids:[{price:0.27,size:38},{price:0.26,size:95},{price:0.25,size:55},{price:0.24,size:140},{price:0.23,size:70}], asks:[{price:0.29,size:30},{price:0.30,size:80},{price:0.31,size:120},{price:0.32,size:60},{price:0.33,size:45}] },
};

// ═══════════════════════════════════════════════
// SERVICES
// ═══════════════════════════════════════════════

function calcDailyReward(market) {
  if (!market.rewards?.rates?.length) return 0;
  return market.rewards.rates.reduce((s, r) => s + (r.rewardsDailyRate ?? r.rewardsAmount / Math.max(r.rewardsDuration, 1)), 0);
}

function calcCompetitionLevel(market) {
  const liq = market.liquidity ?? 0;
  if (liq < 500)   return 1;
  if (liq < 2000)  return 2;
  if (liq < 8000)  return 3;
  if (liq < 25000) return 4;
  return 5;
}

function isEligible(market, filters) {
  const cat = (market.category ?? '').toLowerCase();
  if (EXCLUDED_CATEGORIES.some(ex => cat.includes(ex))) return false;
  const ms = market.rewards?.minSize;
  if (!ALLOWED_MIN_SIZES.includes(ms)) return false;
  if (!filters.selectedMinSizes.includes(ms)) return false;
  if (calcDailyReward(market) < filters.minDailyReward) return false;
  if ((market.rewards?.maxSpread ?? 99) >= filters.maxSpread) return false;
  if (calcCompetitionLevel(market) > filters.maxCompetitionLevel) return false;
  return true;
}

function analyzeBook(tokenId, book, minSize) {
  const empty = { tokenId, bestBidPrice:0, bestAskPrice:0, spread:0, topBidVolume:0, ourStakeUSD:0, minSizeSharePct:0, hasDominantOrder:false, isEligible:false, bids:[], asks:[] };
  if (!book?.bids?.length || !book?.asks?.length) return empty;
  const bids = [...book.bids].filter(b=>b.price>0&&b.size>0).sort((a,b)=>b.price-a.price);
  const asks = [...book.asks].filter(a=>a.price>0&&a.size>0).sort((a,b)=>a.price-b.price);
  if (!bids.length || !asks.length) return empty;
  const bestBid = bids[0], bestAsk = asks[0];
  const topBidVolume = bestBid.size * bestBid.price;
  const ourStakeUSD = minSize * bestBid.price;
  const minSizeSharePct = topBidVolume > 0 ? (ourStakeUSD / topBidVolume) * 100 : 0;
  const hasDominantOrder = bids.some(b => b.size * b.price > 500);
  const spread = bestAsk.price - bestBid.price;
  const isElig = topBidVolume < 300 && minSizeSharePct >= 5 && !hasDominantOrder;
  return { tokenId, bestBidPrice:bestBid.price, bestAskPrice:bestAsk.price, spread, topBidVolume, ourStakeUSD, minSizeSharePct, hasDominantOrder, isEligible:isElig, bids:bids.slice(0,5), asks:asks.slice(0,5) };
}

// ═══════════════════════════════════════════════
// API LAYER
// ═══════════════════════════════════════════════

async function fetchMarkets() {
  if (USE_MOCK) { await new Promise(r=>setTimeout(r,900)); return MOCK_MARKETS; }
  const res = await fetch(`${GAMMA_API}/markets?rewards_min_size=1&limit=100&active=true&closed=false`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return Array.isArray(data) ? data : (data.data ?? []);
}

async function fetchBook(tokenId) {
  if (USE_MOCK) { await new Promise(r=>setTimeout(r,300)); return MOCK_BOOKS[tokenId] ?? { bids:[], asks:[] }; }
  const res = await fetch(`${CLOB_API}/book?token_id=${tokenId}`);
  if (!res.ok) throw new Error(`CLOB HTTP ${res.status}`);
  const data = await res.json();
  return {
    bids:(data.bids??[]).map(b=>({ price:parseFloat(b.price), size:parseFloat(b.size) })),
    asks:(data.asks??[]).map(a=>({ price:parseFloat(a.price), size:parseFloat(a.size) })),
  };
}

// ═══════════════════════════════════════════════
// COMPONENTS
// ═══════════════════════════════════════════════

// ── CompetitionBadge ───────────────────────────
function CompetitionBadge({ level }) {
  const ok = level <= 2;
  const labels = { 1:'Очень низкая', 2:'Низкая', 3:'Средняя', 4:'Высокая', 5:'Очень высокая' };
  return (
    <div className="competition-wrap">
      <div className="competition-dots">
        {[1,2,3,4,5].map(i => (
          <div key={i} className={`dot ${i <= level ? (ok ? 'filled-ok' : 'filled-bad') : ''}`} />
        ))}
      </div>
      <span className={`competition-label ${ok ? 'ok' : 'bad'}`}>{labels[level]}</span>
    </div>
  );
}

// ── OrderBookPreview ───────────────────────────
function OrderBookPreview({ analysis, minSize }) {
  const { bids, asks, spread, minSizeSharePct, ourStakeUSD } = analysis;
  if (!bids.length && !asks.length) return <div style={{padding:'8px 0',fontSize:12,color:'var(--text-muted)'}}>Стакан недоступен</div>;

  const allVols = [...bids, ...asks].map(l => l.size * l.price);
  const maxVol = Math.max(...allVols, 0.01);
  const pct = (l) => Math.max(4, Math.min(100, (l.size * l.price / maxVol) * 100));

  const fmt = (n) => n < 0.01 ? n.toFixed(4) : n < 1 ? n.toFixed(3) : n.toFixed(2);

  return (
    <div className="orderbook">
      <div className="ob-title">📊 Стакан заявок</div>

      {/* Asks (reverse order — best ask at bottom near bids) */}
      <div className="ob-section">
        <div className="ob-section-label asks">Продажа (Ask)</div>
        {[...asks].reverse().map((lvl, i) => (
          <div key={i} className="ob-row">
            <span className="ob-price" style={{color:'var(--red)'}}>{fmt(lvl.price)}</span>
            <div className="ob-bar-wrap">
              <div className="ob-bar ask" style={{width:`${pct(lvl)}%`}} />
            </div>
            <span className="ob-size">{lvl.size.toFixed(0)}д</span>
          </div>
        ))}
      </div>

      {/* Spread separator */}
      <div className="ob-separator">
        <div className="ob-spread-line"/>
        <span className="ob-spread-val">спред {(spread*100).toFixed(1)}¢</span>
        <div className="ob-spread-line"/>
      </div>

      {/* Our stake indicator */}
      <div className="ob-our-stake">
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" style={{flexShrink:0}}>
          <path d="M8 2v12M2 8h12" stroke="var(--blue-accent)" strokeWidth="2" strokeLinecap="round"/>
        </svg>
        <span className="ob-our-stake-label">
          Наша ставка: {minSize} долей (${ourStakeUSD.toFixed(2)}) — {minSizeSharePct.toFixed(0)}% от уровня
        </span>
      </div>

      {/* Bids */}
      <div className="ob-section">
        <div className="ob-section-label bids">Покупка (Bid)</div>
        {bids.map((lvl, i) => (
          <div key={i} className="ob-row">
            <span className="ob-price" style={{color:'var(--emerald-dark)'}}>{fmt(lvl.price)}</span>
            <div className="ob-bar-wrap">
              <div className="ob-bar bid" style={{width:`${pct(lvl)}%`}} />
            </div>
            <span className="ob-size">{lvl.size.toFixed(0)}д</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MarketCard ─────────────────────────────────
function MarketCard({ market, analysis, isRefetching }) {
  const catLabel = CATEGORY_LABELS[market.category?.toLowerCase()] ?? market.category ?? 'Прочее';
  const shareOk = analysis.minSizeSharePct >= 19;
  const shareBadgeClass = shareOk ? 'green' : 'amber';

  const endDate = new Date(market.endDate);
  const dateStr = endDate.toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' });

  return (
    <div className="market-card">
      {/* Header */}
      <div className="card-header">
        <span className="card-category">{catLabel}</span>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {isRefetching && <div className="spinner" title="Обновление стакана..." />}
          <span className={`share-badge ${shareBadgeClass}`}>
            {analysis.minSizeSharePct.toFixed(0)}% доля
          </span>
        </div>
      </div>

      {/* Question */}
      <div className="card-question">{market.question}</div>

      {/* Meta */}
      <div className="card-meta">
        <div className="meta-row">
          <span className="meta-label">
            <svg viewBox="0 0 16 16" width="11" height="11" fill="none"><rect x="1" y="2" width="14" height="13" rx="2" stroke="currentColor" strokeWidth="1.5"/><path d="M5 1v2M11 1v2M1 6h14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
            Закрытие
          </span>
          <span className="meta-value">{dateStr}</span>
        </div>
        <div className="meta-row">
          <span className="meta-label">💰 Награда</span>
          <span className="meta-value reward">${market.dailyReward.toFixed(2)}/день</span>
        </div>
        <div className="meta-row">
          <span className="meta-label">Min размер</span>
          <span className="meta-value">{market.minSize} долей</span>
        </div>
        <div className="meta-row">
          <span className="meta-label">Макс. спред</span>
          <span className="meta-value">{(market.maxSpread).toFixed(1)}¢</span>
        </div>
        <div className="meta-row">
          <span className="meta-label">Лучший bid</span>
          <span className="meta-value">{(analysis.bestBidPrice * 100).toFixed(1)}¢</span>
        </div>
      </div>

      <div className="card-divider"/>

      {/* Competition */}
      <div className="card-competition">
        <div className="filter-label" style={{marginBottom:6,fontSize:10}}>Конкуренция</div>
        <CompetitionBadge level={market.competitionLevel} />
      </div>

      <div className="card-divider"/>

      {/* Order Book */}
      <OrderBookPreview analysis={analysis} minSize={market.minSize} />

      {/* CTA */}
      <div className="card-footer">
        <a
          href={market.marketUrl}
          target="_blank"
          rel="noopener noreferrer"
          className="open-btn"
        >
          Открыть рынок
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M4 12L12 4M12 4H6M12 4v6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </a>
      </div>
    </div>
  );
}

// ── SkeletonCard ───────────────────────────────
function SkeletonCard() {
  return (
    <div className="skel-card">
      <div className="skel-line skeleton" style={{height:10,width:'40%',marginBottom:12}}/>
      <div className="skel-line skeleton" style={{height:16,width:'90%'}}/>
      <div className="skel-line skeleton" style={{height:16,width:'70%',marginBottom:16}}/>
      {[0,1,2,3].map(i=>(
        <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <div className="skel-line skeleton" style={{height:11,width:'35%'}}/>
          <div className="skel-line skeleton" style={{height:11,width:'25%'}}/>
        </div>
      ))}
      <div className="skel-line skeleton" style={{height:80,marginTop:12,borderRadius:8}}/>
      <div className="skel-line skeleton" style={{height:40,marginTop:12,borderRadius:8}}/>
    </div>
  );
}

// ── FilterPanel ────────────────────────────────
function FilterPanel({ filters, setFilters, totalCount, filteredCount, isRefetching }) {
  const toggleSize = (sz) => {
    setFilters(f => {
      const has = f.selectedMinSizes.includes(sz);
      const next = has ? f.selectedMinSizes.filter(s=>s!==sz) : [...f.selectedMinSizes, sz];
      return { ...f, selectedMinSizes: next.length ? next : f.selectedMinSizes };
    });
  };

  return (
    <div className="filter-panel">
      <div className="filter-row">
        {/* minSize buttons */}
        <div className="filter-group">
          <div className="filter-label">Мин. размер ставки</div>
          <div className="btn-group">
            {[20,40,50].map(sz => (
              <button
                key={sz}
                className={`toggle-btn ${filters.selectedMinSizes.includes(sz) ? 'active' : ''}`}
                onClick={() => toggleSize(sz)}
              >
                {sz}
              </button>
            ))}
          </div>
        </div>

        <div className="filter-divider"/>

        {/* Daily reward slider */}
        <div className="filter-group">
          <div className="filter-label">Мин. награда в день</div>
          <div className="slider-wrap">
            <input
              type="range"
              min={30} max={200} step={5}
              value={filters.minDailyReward}
              onChange={e => setFilters(f => ({ ...f, minDailyReward: Number(e.target.value) }))}
            />
            <span className="slider-val">≥ ${filters.minDailyReward}</span>
          </div>
        </div>

        <div className="filter-divider"/>

        {/* Max spread slider */}
        <div className="filter-group">
          <div className="filter-label">Макс. спред</div>
          <div className="slider-wrap">
            <input
              type="range"
              min={1} max={5} step={0.5}
              value={filters.maxSpread}
              onChange={e => setFilters(f => ({ ...f, maxSpread: Number(e.target.value) }))}
            />
            <span className="slider-val">{'<'} {filters.maxSpread}¢</span>
          </div>
        </div>

        {/* Count indicator */}
        <div className={`found-count ${filteredCount === 0 ? 'zero' : ''}`} style={{marginLeft:'auto'}}>
          Найдено рынков: <strong>{filteredCount}</strong> из {totalCount}
          {isRefetching && (
            <div className="update-indicator" style={{marginTop:4}}>
              <div className="spinner"/>
              Обновление стакана...
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════

function App() {
  const [filters, setFilters] = useState({
    selectedMinSizes: [20, 40, 50],
    minDailyReward: 30,
    maxSpread: 5,
    maxCompetitionLevel: 2,
  });

  const [rawMarkets, setRawMarkets]   = useState([]);
  const [books, setBooks]             = useState({});
  const [loading, setLoading]         = useState(true);
  const [error, setError]             = useState(null);
  const [refetching, setRefetching]   = useState(false);
  const refreshTimer = useRef(null);
  const bookTimer    = useRef(null);

  // ── Load markets ──────────────────────────────
  const loadMarkets = useCallback(async () => {
    try {
      setError(null);
      const data = await fetchMarkets();
      setRawMarkets(data);
    } catch(e) {
      setError(e.message ?? 'Ошибка загрузки');
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    loadMarkets();
    refreshTimer.current = setInterval(loadMarkets, 300_000);
    return () => clearInterval(refreshTimer.current);
  }, [loadMarkets]);

  // ── Load order books for top-10 ───────────────
  const loadBooks = useCallback(async (markets) => {
    if (!markets.length) return;
    setRefetching(true);
    const top10 = markets.slice(0, 10);
    const results = await Promise.allSettled(
      top10.map(async m => {
        const primaryToken = m.tokens.find(t => t.outcome.toLowerCase() === 'yes') ?? m.tokens[0];
        if (!primaryToken) return null;
        try {
          const book = await fetchBook(primaryToken.tokenId);
          return { tokenId: primaryToken.tokenId, book };
        } catch { return null; }
      })
    );
    const newBooks = {};
    results.forEach(r => {
      if (r.status === 'fulfilled' && r.value) {
        newBooks[r.value.tokenId] = r.value.book;
      }
    });
    setBooks(prev => ({ ...prev, ...newBooks }));
    setRefetching(false);
  }, []);

  useEffect(() => {
    if (rawMarkets.length) {
      loadBooks(rawMarkets);
      bookTimer.current = setInterval(() => loadBooks(rawMarkets), 30_000);
    }
    return () => clearInterval(bookTimer.current);
  }, [rawMarkets, loadBooks]);

  // ── Compute filtered markets ──────────────────
  const processedMarkets = rawMarkets
    .filter(m => isEligible(m, filters))
    .map(m => {
      const primary = m.tokens.find(t => t.outcome.toLowerCase()==='yes') ?? m.tokens[0];
      if (!primary) return null;
      const book = books[primary.tokenId] ?? { bids:[], asks:[] };
      const analysis = analyzeBook(primary.tokenId, book, m.rewards?.minSize ?? 20);
      if (!analysis.isEligible && Object.keys(books).length > 0) return null;
      return {
        conditionId: m.conditionId,
        slug: m.slug,
        question: m.question,
        category: m.category ?? 'other',
        endDate: m.endDate,
        minSize: m.rewards?.minSize,
        maxSpread: m.rewards?.maxSpread,
        dailyReward: calcDailyReward(m),
        competitionLevel: calcCompetitionLevel(m),
        marketUrl: `https://polymarket.com/event/${m.slug}`,
        primaryTokenId: primary.tokenId,
        analysis,
      };
    })
    .filter(Boolean)
    .sort((a,b) => {
      const scoreA = a.analysis.minSizeSharePct*0.4 + a.dailyReward*0.4 + (5 - a.analysis.spread*100)*0.2;
      const scoreB = b.analysis.minSizeSharePct*0.4 + b.dailyReward*0.4 + (5 - b.analysis.spread*100)*0.2;
      return scoreB - scoreA;
    });

  // While books are loading, show pre-filtered (without book check)
  const preFiltered = rawMarkets.filter(m => isEligible(m, filters));

  // ── Render ────────────────────────────────────
  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <div className="logo-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 3h7v7H3V3zM14 3h7v7h-7V3zM3 14h7v7H3v-7z" stroke="white" strokeWidth="1.8" strokeLinejoin="round"/>
              <circle cx="17.5" cy="17.5" r="3.5" stroke="white" strokeWidth="1.8"/>
              <path d="M20.5 20.5L23 23" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
            </svg>
          </div>
          <div>
            <div className="app-title">Polymarket Rewards Scanner</div>
            <div className="app-subtitle">Сканер рынков для ликвидити-провайдеров</div>
          </div>
        </div>
        <div className="live-badge">
          <div className="live-dot"/>
          Live · Обновление каждые 30с
        </div>
      </div>

      {/* Filter Panel */}
      <FilterPanel
        filters={filters}
        setFilters={setFilters}
        totalCount={rawMarkets.length}
        filteredCount={loading ? 0 : processedMarkets.length}
        isRefetching={refetching}
      />

      {/* Loading State */}
      {loading && (
        <div className="markets-grid">
          {[0,1,2,3,4,5].map(i => <SkeletonCard key={i}/>)}
        </div>
      )}

      {/* Error State */}
      {!loading && error && (
        <div className="state-box">
          <div className="state-icon">⚠️</div>
          <div className="state-title">Не удалось загрузить данные</div>
          <div className="state-sub">
            Не удалось загрузить актуальные данные с Polymarket.<br/>
            Проверьте подключение к интернету и попробуйте снова.
          </div>
          <button className="retry-btn" onClick={() => { setLoading(true); loadMarkets(); }}>
            Повторить попытку
          </button>
        </div>
      )}

      {/* Empty State */}
      {!loading && !error && processedMarkets.length === 0 && (
        <div className="state-box">
          <div className="state-icon">🔍</div>
          <div className="state-title">Рынки не найдены</div>
          <div className="state-sub">
            Нет рынков, соответствующих заданным условиям.<br/>
            Попробуйте снизить планку суточной награды или выбрать другой размер ставки.
          </div>
        </div>
      )}

      {/* Markets Grid */}
      {!loading && !error && processedMarkets.length > 0 && (
        <div className="markets-grid">
          {processedMarkets.map(m => (
            <MarketCard
              key={m.conditionId}
              market={m}
              analysis={m.analysis}
              isRefetching={refetching && Object.keys(books).includes(m.primaryTokenId)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
